<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנהל משימות - משימות יומיות</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            color: var(--gray-900);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 28px;
            color: var(--gray-900);
            margin-bottom: 5px;
        }

        .header p {
            color: var(--gray-500);
            font-size: 14px;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 8px;
            animation: pulse 2s infinite;
        }

        .status-indicator.online {
            background: var(--success);
        }

        .status-indicator.offline {
            background: var(--warning);
        }

        .status-indicator.error {
            background: var(--danger);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .input-group button {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .input-group button:hover {
            background: var(--primary-dark);
        }

        .input-group button:active {
            transform: scale(0.98);
        }

        .tasks-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--gray-100);
        }

        .tasks-header h2 {
            font-size: 18px;
            color: var(--gray-900);
        }

        .tasks-count {
            background: var(--gray-100);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-600);
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            background: var(--gray-50);
            border-left: 4px solid var(--gray-200);
            transition: all 0.3s;
        }

        .task-item:hover {
            background: var(--gray-100);
            transform: translateX(-4px);
        }

        .task-item.completed {
            opacity: 0.6;
            border-left-color: var(--success);
        }

        .task-item.high-priority {
            border-left-color: var(--danger);
            background: rgba(239, 68, 68, 0.05);
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            margin-left: 15px;
            cursor: pointer;
            accent-color: var(--success);
        }

        .task-content {
            flex: 1;
            margin-right: 15px;
        }

        .task-text {
            font-size: 16px;
            color: var(--gray-900);
            word-break: break-word;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--gray-500);
        }

        .task-time {
            font-size: 12px;
            color: var(--gray-400);
            margin-top: 5px;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .task-actions button {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-edit {
            background: var(--primary);
            color: white;
        }

        .btn-edit:hover {
            background: var(--primary-dark);
        }

        .btn-delete {
            background: var(--danger);
            color: white;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray-400);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 20px;
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px;
            border: 2px solid var(--gray-200);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .form-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-save {
            background: var(--success);
            color: white;
        }

        .btn-save:hover {
            background: #059669;
        }

        .btn-cancel {
            background: var(--gray-200);
            color: var(--gray-900);
        }

        .btn-cancel:hover {
            background: var(--gray-300);
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid var(--gray-200);
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-600);
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .sync-status {
            font-size: 12px;
            color: var(--gray-500);
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--gray-200);
        }

        .sync-status.syncing {
            color: var(--primary);
            font-weight: 600;
        }

        .sync-status.error {
            color: var(--danger);
        }

        @media (max-width: 600px) {
            body {
                padding: 5px;
            }

            .header {
                padding: 15px;
                margin-bottom: 15px;
            }

            .header h1 {
                font-size: 24px;
            }

            .input-group {
                flex-direction: column;
                padding: 15px;
            }

            .input-group input {
                width: 100%;
            }

            .task-item {
                flex-wrap: wrap;
            }

            .task-actions {
                width: 100%;
                margin-top: 10px;
            }

            .modal-content {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                משימות יומיות
                <span class="status-indicator online" id="statusIndicator"></span>
            </h1>
            <p id="headerSubtitle">טוען משימות...</p>
        </div>

        <div class="input-group">
            <input
                type="text"
                id="taskInput"
                placeholder="הוסף משימה חדשה..."
                dir="rtl"
            >
            <button onclick="addTask()">הוסף</button>
        </div>

        <div class="tasks-container">
            <div class="filters">
                <button class="filter-btn active" onclick="filterTasks('all')">הכל</button>
                <button class="filter-btn" onclick="filterTasks('pending')">בהמתנה</button>
                <button class="filter-btn" onclick="filterTasks('completed')">הושלם</button>
            </div>

            <div class="tasks-header">
                <h2>המשימות שלך</h2>
                <span class="tasks-count" id="tasksCount">0</span>
            </div>

            <div id="tasksList"></div>

            <div class="sync-status" id="syncStatus"></div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">ערוך משימה</div>
            <form class="modal-form" onsubmit="saveEdit(event)">
                <div class="form-group">
                    <label for="editTaskText">טקסט המשימה</label>
                    <textarea id="editTaskText" required rows="3" dir="rtl"></textarea>
                </div>
                <div class="form-group">
                    <label for="editTaskPriority">עדיפות</label>
                    <select id="editTaskPriority">
                        <option value="normal">רגיל</option>
                        <option value="high">גבוה</option>
                        <option value="low">נמוך</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editTaskDueDate">תאריך יעד</label>
                    <input type="date" id="editTaskDueDate">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-save">שמור</button>
                    <button type="button" class="btn-cancel" onclick="closeEditModal()">בטל</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURATION & CONSTANTS
        // ============================================================
        const SUPABASE_URL = 'https://oniwvibzvwzukfvmykls.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uaXd2aWJ6dnd6dWtmdm15a2xzIiwicm9sZSI6ImFub24iLCJpYXQiOjE2NzkyMDkyMzMsImV4cCI6MTk5NDc4NTIzM30.F9ZYJRRm8EY0zfXLzN-RDRFH2_KwMZnhb7v4u5TJFnc';
        const SUPABASE_TIMEOUT = 5000; // 5 seconds timeout
        const TABLE_NAME = 'tasks';

        // Global state
        let tasks = [];
        let currentFilter = 'all';
        let editingTaskId = null;
        let isSyncing = false;
        let loadedFromCloud = false;

        // ============================================================
        // INITIALIZATION - CRITICAL: Load from Cloud FIRST
        // ============================================================
        async function initializeApp() {
            console.log('[INIT] Starting application initialization...');

            // Clear localStorage stale data first
            const oldLocalStorageData = localStorage.getItem('tasks') || '[]';
            console.log('[INIT] Old localStorage has', JSON.parse(oldLocalStorageData).length, 'tasks');

            // Update UI to show loading state
            updateSyncStatus('טוען משימות מ-Supabase...', 'syncing');
            updateHeaderSubtitle('טוען משימות מהקלאוד...');

            // STEP 1: Try to load from Supabase with timeout
            console.log('[INIT] Step 1: Attempting to load from Supabase...');
            const cloudLoadSuccess = await loadFromCloud();

            if (cloudLoadSuccess) {
                // STEP 2A: Cloud load succeeded - render with cloud data
                console.log('[INIT] Cloud load successful! Rendering', tasks.length, 'tasks from Supabase');
                updateHeaderSubtitle('משימות מסונכרנות מהקלאוד');
                updateSyncStatus('משימות מסונכרנות בהצלחה', '');
                renderTasks();
            } else {
                // STEP 2B: Cloud load failed - fallback to localStorage
                console.log('[INIT] Cloud load failed. Falling back to localStorage...');
                loadFromLocalStorage();
                updateHeaderSubtitle('משימות מעלויים מקומיים');
                updateSyncStatus('לא הצליח לסנכרן - משימות מעלויים מקומיים', 'error');
                renderTasks();
            }

            console.log('[INIT] Application initialized successfully');
        }

        // ============================================================
        // CLOUD SYNC - Load from Supabase with timeout
        // ============================================================
        async function loadFromCloud() {
            console.log('[CLOUD] Starting cloud load with', SUPABASE_TIMEOUT, 'ms timeout');

            return new Promise((resolve) => {
                // Set timeout - if not resolved within timeout, fallback to localStorage
                const timeoutId = setTimeout(() => {
                    console.warn('[CLOUD] Load timeout after', SUPABASE_TIMEOUT, 'ms');
                    resolve(false); // Return false to trigger localStorage fallback
                }, SUPABASE_TIMEOUT);

                // Attempt to load from Supabase
                fetchFromSupabase()
                    .then((cloudTasks) => {
                        clearTimeout(timeoutId);

                        if (cloudTasks && Array.isArray(cloudTasks) && cloudTasks.length > 0) {
                            console.log('[CLOUD] Successfully loaded', cloudTasks.length, 'tasks from Supabase');
                            // Clear localStorage before applying cloud data
                            localStorage.removeItem('tasks');
                            // Apply cloud data
                            tasks = cloudTasks.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                            loadedFromCloud = true;
                            resolve(true);
                        } else {
                            console.log('[CLOUD] No tasks found in Supabase');
                            resolve(false);
                        }
                    })
                    .catch((error) => {
                        clearTimeout(timeoutId);
                        console.error('[CLOUD] Error loading from Supabase:', error);
                        resolve(false);
                    });
            });
        }

        async function fetchFromSupabase() {
            console.log('[SUPABASE] Fetching tasks from Supabase...');

            const response = await fetch(
                `${SUPABASE_URL}/rest/v1/${TABLE_NAME}`,
                {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                    }
                }
            );

            if (!response.ok) {
                throw new Error(`Supabase error: ${response.status}`);
            }

            const data = await response.json();
            console.log('[SUPABASE] Received', data.length, 'tasks');
            return data;
        }

        // ============================================================
        // LOCAL STORAGE FALLBACK
        // ============================================================
        function loadFromLocalStorage() {
            console.log('[LOCAL] Loading from localStorage...');

            try {
                const stored = localStorage.getItem('tasks');
                const parsed = stored ? JSON.parse(stored) : [];

                if (Array.isArray(parsed) && parsed.length > 0) {
                    tasks = parsed;
                    console.log('[LOCAL] Loaded', tasks.length, 'tasks from localStorage');
                } else {
                    console.log('[LOCAL] No tasks in localStorage');
                    tasks = [];
                }
            } catch (error) {
                console.error('[LOCAL] Error loading from localStorage:', error);
                tasks = [];
            }
        }

        // ============================================================
        // SAVE OPERATIONS
        // ============================================================
        async function saveToCloud() {
            if (!loadedFromCloud) {
                console.log('[SAVE] Not syncing - data from localStorage');
                return;
            }

            isSyncing = true;
            updateSyncStatus('משנה...', 'syncing');

            try {
                // Implementation would sync with Supabase
                // For now, just log
                console.log('[SAVE] Syncing to Supabase...');

                // TODO: Implement actual Supabase sync if needed
                updateSyncStatus('מסונכרן בהצלחה', '');
            } catch (error) {
                console.error('[SAVE] Error syncing:', error);
                updateSyncStatus('שגיאה בסנכרון', 'error');
            } finally {
                isSyncing = false;
                // Save to localStorage as backup
                saveToLocalStorage();
            }
        }

        function saveToLocalStorage() {
            try {
                localStorage.setItem('tasks', JSON.stringify(tasks));
                console.log('[LOCAL] Saved', tasks.length, 'tasks to localStorage');
            } catch (error) {
                console.error('[LOCAL] Error saving to localStorage:', error);
                updateSyncStatus('שגיאה בשמירה מקומית', 'error');
            }
        }

        // ============================================================
        // TASK MANAGEMENT
        // ============================================================
        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();

            if (!text) {
                alert('אנא הכנס טקסט למשימה');
                return;
            }

            const newTask = {
                id: Date.now().toString(),
                text: text,
                completed: false,
                priority: 'normal',
                created_at: new Date().toISOString(),
                due_date: null
            };

            tasks.unshift(newTask);
            input.value = '';

            renderTasks();
            saveToCloud();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                renderTasks();
                saveToCloud();
            }
        }

        function deleteTask(id) {
            if (confirm('האם אתה בטוח שברצונך למחוק משימה זו?')) {
                tasks = tasks.filter(t => t.id !== id);
                renderTasks();
                saveToCloud();
            }
        }

        function openEditModal(id) {
            editingTaskId = id;
            const task = tasks.find(t => t.id === id);

            if (task) {
                document.getElementById('editTaskText').value = task.text;
                document.getElementById('editTaskPriority').value = task.priority || 'normal';
                document.getElementById('editTaskDueDate').value = task.due_date ? task.due_date.split('T')[0] : '';
                document.getElementById('editModal').classList.add('active');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingTaskId = null;
        }

        function saveEdit(event) {
            event.preventDefault();

            const task = tasks.find(t => t.id === editingTaskId);
            if (task) {
                task.text = document.getElementById('editTaskText').value;
                task.priority = document.getElementById('editTaskPriority').value;
                task.due_date = document.getElementById('editTaskDueDate').value || null;

                renderTasks();
                saveToCloud();
                closeEditModal();
            }
        }

        // ============================================================
        // RENDERING
        // ============================================================
        function renderTasks() {
            const container = document.getElementById('tasksList');
            const filtered = getFilteredTasks();

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div>אין משימות כרגע</div>
                    </div>
                `;
                document.getElementById('tasksCount').textContent = '0';
                return;
            }

            container.innerHTML = filtered
                .map(task => `
                    <div class="task-item ${task.completed ? 'completed' : ''} ${task.priority === 'high' ? 'high-priority' : ''}">
                        <input
                            type="checkbox"
                            class="task-checkbox"
                            ${task.completed ? 'checked' : ''}
                            onchange="toggleTask('${task.id}')"
                        >
                        <div class="task-content">
                            <div class="task-text">${escapeHtml(task.text)}</div>
                            <div class="task-time">${formatDate(task.created_at)}</div>
                        </div>
                        <div class="task-actions">
                            <button class="btn-edit" onclick="openEditModal('${task.id}')">ערוך</button>
                            <button class="btn-delete" onclick="deleteTask('${task.id}')">מחק</button>
                        </div>
                    </div>
                `)
                .join('');

            document.getElementById('tasksCount').textContent = filtered.length;
        }

        function getFilteredTasks() {
            switch (currentFilter) {
                case 'pending':
                    return tasks.filter(t => !t.completed);
                case 'completed':
                    return tasks.filter(t => t.completed);
                default:
                    return tasks;
            }
        }

        function filterTasks(filter) {
            currentFilter = filter;

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            renderTasks();
        }

        // ============================================================
        // UI HELPERS
        // ============================================================
        function updateSyncStatus(message, status) {
            const element = document.getElementById('syncStatus');
            element.textContent = message;
            element.className = 'sync-status ' + status;
        }

        function updateHeaderSubtitle(text) {
            document.getElementById('headerSubtitle').textContent = text;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            if (date.toDateString() === today.toDateString()) {
                return `היום ${date.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' })}`;
            } else if (date.toDateString() === yesterday.toDateString()) {
                return `אתמול ${date.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' })}`;
            }

            return date.toLocaleDateString('he-IL');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // ============================================================
        // KEYBOARD SHORTCUTS & EVENT LISTENERS
        // ============================================================
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') {
                closeEditModal();
            }
        });

        // ============================================================
        // START APPLICATION
        // ============================================================
        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
