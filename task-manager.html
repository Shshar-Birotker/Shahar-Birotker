<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow – Welfare Planner</title>
<style>
:root {
  --bg: #f9f8f6; --surface: #fff; --border: #eeebe7; --border2: #dedad5;
  --text: #282826; --t2: #6b6967; --t3: #b0ada9;
  --acc: #c0654a; --acc-bg: #fdf3f0;
  --green: #2a9d8f;
  --r: 12px; --r-sm: 8px;
  --sh: 0 1px 4px rgba(0,0,0,.05); --sh-lg: 0 4px 20px rgba(0,0,0,.08);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; min-height: 100vh; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

/* ── SIDEBAR ── */
#sb { width: 220px; min-width: 220px; background: var(--surface); border-left: 1px solid var(--border); height: 100vh; position: sticky; top: 0; display: flex; flex-direction: column; overflow-y: auto; }
.sb-logo { padding: 22px 18px 16px; font-size: 15px; font-weight: 600; letter-spacing: -.3px; border-bottom: 1px solid var(--border); }
.sb-logo em { color: var(--acc); font-style: normal; }
.sb-sec { padding: 16px 16px 5px; font-size: 10.5px; font-weight: 500; letter-spacing: .5px; text-transform: uppercase; color: var(--t3); }
.sb-item { display: flex; align-items: center; gap: 9px; padding: 8px 12px; margin: 1px 6px; border-radius: 8px; cursor: pointer; font-size: 13.5px; color: var(--t2); font-weight: 400; transition: background .12s, color .12s; user-select: none; }
.sb-item:hover { background: var(--bg); color: var(--text); }
.sb-item.active { background: var(--acc-bg); color: var(--acc); font-weight: 500; }
.sb-dot { width: 8px; height: 8px; border-radius: 3px; flex-shrink: 0; }
.sb-cnt { margin-right: auto; font-size: 11px; font-weight: 500; color: var(--t3); background: var(--bg); padding: 1px 7px; border-radius: 10px; }
.sb-add { display: flex; align-items: center; gap: 7px; padding: 8px 12px; margin: 2px 6px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--t3); border: 1.5px dashed var(--border); transition: all .15s; }
.sb-add:hover { color: var(--acc); border-color: var(--acc); background: var(--acc-bg); }
.sb-footer { margin-top: auto; border-top: 1px solid var(--border); padding: 8px 6px; }

/* ── MAIN ── */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

/* sidebar search */
.sb-search { display:flex; align-items:center; gap:6px; margin:8px 8px 4px; padding:7px 10px; border:1px solid var(--border); border-radius:8px; background:var(--bg); }
.sb-search input { flex:1; border:none; background:transparent; outline:none; font-size:13px; direction:rtl; color:var(--text); font-family:var(--font); }
.sb-search input::placeholder { color:var(--t3); }

/* floating add button */
.fab { position:fixed; bottom:28px; left:28px; width:50px; height:50px; border-radius:50%; background:var(--acc); color:#fff; border:none; font-size:24px; cursor:pointer; box-shadow:0 4px 18px rgba(192,101,74,.38); display:flex; align-items:center; justify-content:center; z-index:50; transition:all .15s; line-height:1; }
.fab:hover { background:#a8573e; transform:scale(1.08); }

/* inline view toggle */
.view-toggle-bar { display:flex; gap:6px; padding:14px 28px 0; }
.vt-btn { padding:5px 14px; border-radius:20px; font-size:12.5px; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--t2); transition:all .12s; font-weight:400; }
.vt-btn:hover { color:var(--text); border-color:var(--border2); }
.vt-btn.active { background:var(--acc); color:#fff; border-color:var(--acc); font-weight:500; }
.btn { padding: 7px 15px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .12s; }
.bp { background: var(--acc); color: #fff; } .bp:hover { background: #a8573e; }
.bg { background: transparent; color: var(--t2); border: 1px solid var(--border); } .bg:hover { background: var(--bg); color: var(--text); }
.bxs { padding: 4px 10px; font-size: 12px; border-radius: 6px; }

/* ── CONTENT ── */
#content { flex: 1; overflow-y: auto; overflow-x: auto; padding: 0 28px 80px; }

/* ── COVER IMAGE ── */
.cover-section { margin: 0 -28px; width: calc(100% + 56px); position: relative; overflow: hidden; }
.cover-img-wrap {
  width: 100%; height: 170px; background: linear-gradient(135deg, var(--border) 0%, #e8e4df 100%);
  background-size: cover; background-position: center;
  position: relative; cursor: pointer;
}
.cover-img-wrap.empty { height: 56px; background: transparent; border-bottom: 1px solid var(--border); }
.cover-overlay { position: absolute; inset: 0; display: flex; align-items: flex-end; justify-content: flex-end; gap: 6px; padding: 10px 12px; background: linear-gradient(transparent 50%, rgba(0,0,0,.25)); opacity: 0; transition: opacity .2s; }
.cover-img-wrap:hover .cover-overlay { opacity: 1; }
.cover-img-wrap.empty .cover-overlay { opacity: 1; background: transparent; align-items: center; justify-content: flex-start; padding-right: 28px; }
.cover-btn { font-size: 12px; padding: 5px 11px; border-radius: 6px; cursor: pointer; border: none; font-weight: 500; background: rgba(255,255,255,.88); color: var(--t2); display: flex; align-items: center; gap: 5px; }
.cover-btn:hover { background: #fff; }
.cover-domain-name {
  position: absolute; bottom: 14px; right: 28px;
  font-size: 22px; font-weight: 600; color: #fff;
  text-shadow: 0 1px 8px rgba(0,0,0,.4);
  pointer-events: none;
}
.cover-img-wrap.empty .cover-domain-name { display: none; }
.content-body { padding-top: 24px; }

/* ── DAY TABS ── */
.day-tabs { display: flex; gap: 6px; margin-bottom: 20px; }
.day-tab { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 400; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--t2); transition: all .15s; }
.day-tab:hover { border-color: var(--border2); color: var(--text); background: var(--bg); }
.day-tab.active { background: var(--acc); color: #fff; border-color: var(--acc); font-weight: 500; }

/* ── TASK TABLE ── */
.task-table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.task-table thead tr { background: transparent; }
.task-table th { padding: 11px 14px; font-size: 11px; font-weight: 500; color: var(--t3); text-align: right; border-bottom: 1px solid var(--border); letter-spacing: .3px; white-space: nowrap; }
.task-table th:first-child { width: 48px; }
.task-table td { padding: 0; border-bottom: 1px solid var(--border); vertical-align: middle; }
.task-table tr:last-child td { border-bottom: none; }
.task-table tr:hover td { background: #faf9f7; }
.task-table tr.done-row { opacity: .5; }

.row-check-wrap { padding: 12px 14px; display: flex; justify-content: center; }
.row-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; color: transparent; transition: all .2s; flex-shrink: 0; }
.row-check:hover { border-color: var(--green); }
.row-check.chk { background: var(--green); border-color: var(--green); color: #fff; }

.row-name-cell { padding: 12px 6px 12px 14px; }
.row-title { font-size: 14px; font-weight: 400; line-height: 1.4; margin-bottom: 4px; color: var(--text); }
.row-title.struck { text-decoration: line-through; color: var(--t3); }
.row-ctx { display: flex; align-items: center; gap: 7px; }
.row-parent { font-size: 12px; color: var(--t3); font-weight: 400; }
.row-proj-tag { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }

.pri-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.pri-h { background: #f87171; } .pri-m { background: #fbbf24; } .pri-l { background: #d1d5db; }

.sts-badge { font-size: 11.5px; font-weight: 400; padding: 3px 10px; border-radius: 20px; cursor: pointer; border: none; white-space: nowrap; transition: opacity .1s; }
.sts-badge:hover { opacity: .8; }
.s-todo { background: #f4f4f5; color: #71717a; }
.s-inprog { background: #fef9c3; color: #92400e; }
.s-done { background: #dcfce7; color: #166534; }
.s-stuck { background: #fee2e2; color: #991b1b; }

.date-cell { padding: 12px 14px; font-size: 12.5px; color: var(--t3); white-space: nowrap; text-align: left; }
.date-cell.urg { color: #ef4444; font-weight: 500; }
.date-cell.soon { color: #f59e0b; font-weight: 500; }
.edit-cell { padding: 12px 10px; opacity: 0; transition: opacity .12s; }
.task-table tr:hover .edit-cell { opacity: 1; }
.icon-btn { background: none; border: none; cursor: pointer; font-size: 13px; color: var(--t3); padding: 4px 6px; border-radius: 6px; transition: background .1s; }
.icon-btn:hover { background: var(--bg); color: var(--t2); }

.table-footer { display: flex; align-items: center; padding: 11px 16px; background: #faf9f7; border-top: 1px solid var(--border); border-radius: 0 0 var(--r) var(--r); }
.tf-count { font-size: 12px; color: var(--t3); }

/* ── INLINE ADD ── */
.inline-add-trigger td { cursor: pointer; }
.inline-add-trigger:hover td { background: #f4f3ff; }
.inline-add-label { display: flex; align-items: center; gap: 10px; padding: 11px 14px; font-size: 13.5px; color: var(--t3); }
.inline-add-label:hover { color: var(--acc); }
.inline-add-circle { width: 20px; height: 20px; border-radius: 50%; border: 1.5px dashed var(--border2); flex-shrink: 0; }
.inline-add-active td { background: #faf9ff; }
.inline-input-wrap { display: flex; align-items: center; gap: 10px; padding: 10px 14px; }
.inline-task-input { font-size: 14px; font-weight: 400; border: none; outline: none; background: transparent; flex: 1; color: var(--text); font-family: var(--font); direction: rtl; min-width: 0; }
.inline-task-input::placeholder { color: var(--t3); }
.inline-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.inline-sel { font-size: 11.5px; border: none; background: transparent; color: var(--t3); cursor: pointer; outline: none; font-family: var(--font); direction: rtl; max-width: 130px; }
.inline-date-in { font-size: 11.5px; border: none; background: transparent; color: var(--t3); outline: none; font-family: var(--font); }
.inline-save-btn { background: var(--acc); color: #fff; border: none; border-radius: 7px; padding: 5px 12px; font-size: 12px; cursor: pointer; font-weight: 500; white-space: nowrap; }
.inline-save-btn:hover { background: #a8573e; }
.inline-cancel-btn { background: none; border: none; color: var(--t3); padding: 4px 6px; cursor: pointer; font-size: 16px; line-height: 1; border-radius: 5px; }
.inline-cancel-btn:hover { background: var(--bg); }

/* ── MODAL ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.overlay.hidden { display: none; }
.modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,.14); }
.mhdr { padding: 20px 24px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.mttl { font-size: 15px; font-weight: 500; flex: 1; }
.mx { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--t3); padding: 0 4px; }
.mx:hover { color: var(--text); }
.mbody { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
.mfoot { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.fg { display: flex; flex-direction: column; gap: 6px; }
.fg label { font-size: 11.5px; font-weight: 500; color: var(--t3); }
.fi, .fs, .ft { padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13.5px; font-family: var(--font); color: var(--text); background: var(--surface); outline: none; direction: rtl; transition: border-color .12s; line-height: 1.4; }
.fi:focus, .fs:focus, .ft:focus { border-color: var(--acc); box-shadow: 0 0 0 3px rgba(92,95,239,.08); }
.ft { resize: vertical; min-height: 64px; }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.cswatches { display: flex; gap: 8px; flex-wrap: wrap; }
.csw { width: 26px; height: 26px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: transform .1s, border-color .1s; }
.csw:hover, .csw.sel { transform: scale(1.12); border-color: #282826; }
.st-list-edit { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
.ste-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; background: var(--bg); }
.ste-check { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; color: transparent; cursor: pointer; transition: all .12s; }
.ste-check.done { background: var(--green); border-color: var(--green); color: #fff; }
.ste-title { font-size: 13px; flex: 1; }
.ste-date { font-size: 11px; color: var(--t3); white-space: nowrap; }
.ste-del { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--t3); padding: 2px; }
.ste-del:hover { color: #ef4444; }
.add-st-row { display: flex; gap: 8px; margin-top: 6px; }
.add-st-row input { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--surface); outline: none; direction: rtl; font-family: var(--font); }
.add-st-row input:focus { border-color: var(--acc); }
.add-st-date { width: 130px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; background: var(--surface); outline: none; }
.add-st-date:focus { border-color: var(--acc); }

#toasts { position: fixed; bottom: 24px; left: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 200; }
.toast { background: #282826; color: #fff; padding: 10px 16px; border-radius: 10px; font-size: 13px; box-shadow: var(--sh-lg); animation: tin .2s ease; }
@keyframes tin { from { transform: translateY(8px); opacity: 0; } }
.empty { text-align: center; padding: 60px; color: var(--t3); }
.empty .ei { font-size: 34px; opacity: .35; margin-bottom: 12px; }
.empty h3 { font-size: 15px; font-weight: 500; color: var(--t2); margin-bottom: 6px; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ══ HOME PAGE ══ */
.home-cover {
  width: calc(100% + 56px); margin: 0 -28px; height: 170px;
  background: linear-gradient(135deg, #d4c5b2 0%, #c5b8a8 40%, #b8cbba 100%);
  background-size: cover; background-position: center;
  position: relative; overflow: hidden; cursor: pointer;
}
.home-cover-btns { position: absolute; bottom: 12px; left: 12px; display: flex; gap: 8px; opacity: 0; transition: opacity .2s; z-index: 3; }
.cover-drag-hint {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.22); color: #fff; font-size: 13px; font-weight: 500;
  letter-spacing: .2px; gap: 8px; pointer-events: none; opacity: 0; transition: opacity .15s;
  z-index: 2;
}
.cover-dragging .cover-drag-hint { opacity: 1; }
.cover-dragging { cursor: grabbing !important; }
.cover-has-image { cursor: grab; }
.home-cover:hover .home-cover-btns { opacity: 1; }
.home-cover-btn { font-size: 12px; padding: 5px 11px; border-radius: 6px; cursor: pointer; border: none; font-weight: 500; background: rgba(255,255,255,.82); color: #3a3a38; display: flex; align-items: center; gap: 5px; }
.home-cover-btn:hover { background: rgba(255,255,255,.96); }

.home-header { padding: 0 0 20px; }
.home-emoji { font-size: 52px; margin-top: -28px; margin-bottom: 8px; display: block; cursor: pointer; line-height: 1; position: relative; z-index: 2; }
.home-title { font-size: 30px; font-weight: 600; letter-spacing: -.8px; color: var(--text); margin-bottom: 6px; }
.home-date { font-size: 14px; color: var(--t3); font-weight: 400; }

/* ── FREE CANVAS ── */
.home-canvas {
  position: relative;
  min-height: 880px;
  min-width: 1000px; /* prevents clamping issues on narrow screens */
  width: 100%;
}
.cw {
  position: absolute;
  min-width: 200px; min-height: 80px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--sh);
  display: flex; flex-direction: column;
  transition: box-shadow .15s;
}
.cw.cw-dragging { box-shadow: var(--sh-lg); z-index: 50; opacity: .92; }
.cw.cw-resizing { box-shadow: var(--sh-lg); z-index: 50; }
/* move handle */
.cw-handle {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  cursor: grab; user-select: none; flex-shrink: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  color: var(--t3); font-size: 12px;
  transition: background .1s;
}
.cw-handle:hover { background: var(--acc-bg); color: var(--acc); }
.cw-handle:active { cursor: grabbing; }
.cw-handle-dots { letter-spacing: 1px; font-size: 14px; }
.cw-handle-name { font-size: 11px; font-weight: 500; flex: 1; }
/* widget content scrolls */
.cw-inner { flex: 1; overflow-y: auto; overflow-x: hidden; }
/* resize handles */
.cw-rh {
  position: absolute; background: transparent; z-index: 10;
}
/* bottom-right (physical) — drag right+down to enlarge */
.cw-rh-br { bottom: 0; right: 0; width: 16px; height: 16px; cursor: nwse-resize; }
.cw-rh-br::after { content:''; position:absolute; bottom:3px; right:3px; width:8px; height:8px; border-right:2px solid var(--border2); border-bottom:2px solid var(--border2); border-radius:0 0 3px 0; }
.cw-rh-br:hover::after { border-color: var(--acc); }
/* bottom-left (physical) — drag left+down to enlarge (RTL) */
.cw-rh-bl { bottom: 0; left: 0; width: 16px; height: 16px; cursor: nesw-resize; }
.cw-rh-bl::after { content:''; position:absolute; bottom:3px; left:3px; width:8px; height:8px; border-left:2px solid var(--border2); border-bottom:2px solid var(--border2); border-radius:0 0 0 3px; }
.cw-rh-bl:hover::after { border-color: var(--acc); }
/* bottom edge — drag down for height only */
.cw-rh-b { bottom:0; left:16px; right:16px; height:8px; cursor:s-resize; }
.cw-rh-b:hover { background: rgba(92,95,239,.08); }

/* today widget inline add — always visible form */
.today-add-form { display: flex; flex-direction: column; gap: 9px; padding: 12px 0 4px; border-top: 1px solid var(--border); margin-top: 6px; }
.today-add-label { font-size: 10.5px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; color: var(--t3); }
.today-add-inp {
  font-size: 13.5px; border: 1px solid var(--border); border-radius: 8px;
  outline: none; background: var(--bg); color: var(--text);
  font-family: var(--font); direction: rtl; padding: 8px 11px;
  transition: border-color .12s;
}
.today-add-inp:focus { border-color: var(--acc); background: var(--surface); box-shadow: 0 0 0 3px rgba(92,95,239,.08); }
.today-add-inp::placeholder { color: var(--t3); }
.today-add-meta { display: flex; gap: 8px; align-items: center; }
.today-add-sel {
  flex: 1; font-size: 12.5px; border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 10px; background: var(--bg); color: var(--t2);
  outline: none; font-family: var(--font); direction: rtl; transition: border-color .12s;
}
.today-add-sel:focus { border-color: var(--acc); }
.today-add-date {
  font-size: 12px; border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 9px; background: var(--bg); color: var(--t2); outline: none;
  transition: border-color .12s;
}
.today-add-date:focus { border-color: var(--acc); }
.today-add-save {
  background: var(--acc); color: #fff; border: none; border-radius: 8px;
  padding: 8px 0; font-size: 13px; cursor: pointer; font-weight: 500;
  width: 100%; transition: background .12s; letter-spacing: .1px;
}
.today-add-save:hover { background: #a8573e; }

/* widgets — inside canvas wrapper or standalone */
.widget { background: var(--surface); overflow: hidden; height: 100%; display: flex; flex-direction: column; }
.cw-inner { display: flex; flex-direction: column; }
.cw-inner .widget { border: none; border-radius: 0; flex: 1; }
.cw-inner .widget-body { flex: 1; min-height: 0; overflow-y: auto; }
.widget-hdr { padding: 12px 16px 8px; font-size: 10.5px; font-weight: 600; letter-spacing: .7px; text-transform: uppercase; color: var(--t3); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.widget-body { padding: 14px 16px; }

/* mini calendar */
.mini-cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.mini-cal-month { font-size: 13px; font-weight: 500; color: var(--text); }
.mini-cal-btn { background: none; border: none; cursor: pointer; color: var(--t3); font-size: 12px; padding: 2px 6px; border-radius: 4px; }
.mini-cal-btn:hover { background: var(--bg); color: var(--text); }
.mini-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
.mini-cal-dn { font-size: 10px; font-weight: 600; color: var(--t3); text-align: center; padding: 3px 0; }
.mini-cal-day { font-size: 11.5px; text-align: center; padding: 5px 2px; border-radius: 6px; cursor: pointer; color: var(--t2); position: relative; transition: background .1s; }
.mini-cal-day:hover { background: var(--bg); }
.mini-cal-day.other-month { color: var(--t3); opacity: .4; }
.mini-cal-day.today { background: var(--acc); color: #fff; font-weight: 600; }
.mini-cal-day.has-tasks::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--acc); }
.mini-cal-day.today.has-tasks::after { background: rgba(255,255,255,.7); }

/* today tasks widget */
.today-task-item { display: flex; align-items: flex-start; gap: 9px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.today-task-item:last-of-type { border-bottom: none; }
.today-chk { width: 17px; height: 17px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 10px; color: transparent; transition: all .18s; margin-top: 1px; }
.today-chk:hover { border-color: var(--green); }
.today-chk.done { background: var(--green); border-color: var(--green); color: #fff; }
.today-task-info { flex: 1; min-width: 0; }
.today-task-name { font-size: 13px; line-height: 1.35; color: var(--text); }
.today-task-name.struck { text-decoration: line-through; color: var(--t3); }
.today-task-proj { font-size: 11px; color: var(--t3); margin-top: 1px; }
.today-count { font-size: 11.5px; color: var(--t3); text-align: center; padding-top: 10px; }
.today-empty { text-align: center; padding: 20px 0; color: var(--t3); font-size: 13px; }

/* goals widget */
.goal-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.goal-item:last-child { border-bottom: none; }
.goal-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 1px; }
.goal-num.g1 { background: #fef9c3; color: #854d0e; }
.goal-num.g2 { background: #dbeafe; color: #1e40af; }
.goal-num.g3 { background: #dcfce7; color: #166534; }
.goal-input { flex: 1; font-size: 13px; border: none; outline: none; background: transparent; color: var(--text); font-family: var(--font); direction: rtl; line-height: 1.4; resize: none; min-height: 20px; }
.goal-input::placeholder { color: var(--t3); }

/* upcoming strip */
.upcoming-strip { margin-top: 18px; }
.upcoming-strip-hdr { font-size: 10.5px; font-weight: 600; letter-spacing: .7px; text-transform: uppercase; color: var(--t3); margin-bottom: 10px; }
.upcoming-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.up-chip { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; cursor: pointer; transition: box-shadow .12s; max-width: 240px; }
.up-chip:hover { box-shadow: var(--sh-lg); }
.up-chip-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.up-chip-name { font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
.up-chip-date { font-size: 11px; color: var(--t3); white-space: nowrap; }
.up-chip-date.soon { color: #f59e0b; font-weight: 600; }
.up-chip-date.urg { color: #ef4444; font-weight: 600; }

/* ── QUESTIONS WIDGET ── */
.q-item { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.q-item:last-child { border-bottom: none; }
.q-check { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 9px; color: transparent; transition: all .15s; margin-top: 2px; }
.q-check:hover { border-color: var(--acc); }
.q-check.asked { background: var(--acc); border-color: var(--acc); color: #fff; }
.q-text { flex: 1; font-size: 13px; color: var(--t2); line-height: 1.4; cursor: text; border-radius: 3px; }
.q-text:hover { background: var(--bg); }
.q-text.asked-txt { text-decoration: line-through; color: var(--t3); }
.q-del { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--t3); padding: 2px 4px; opacity: 0; border-radius: 4px; }
.q-item:hover .q-del { opacity: 1; }
.q-del:hover { color: #ef4444; background: #fee2e2; }
.q-add-row { display: flex; gap: 6px; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
.q-add-inp { flex: 1; font-size: 13px; border: 1px solid var(--border); border-radius: 7px; padding: 6px 10px; background: var(--bg); outline: none; color: var(--text); font-family: var(--font); direction: rtl; }
.q-add-inp:focus { border-color: var(--acc); background: var(--surface); }
.q-add-btn { background: var(--acc); color: #fff; border: none; border-radius: 7px; padding: 6px 12px; font-size: 12px; cursor: pointer; white-space: nowrap; }
.q-add-btn:hover { background: #a8573e; }

/* ── VIEW MODE TOGGLE ── */
.view-toggle { display: flex; gap: 4px; }
.vt-btn { padding: 5px 13px; border-radius: 20px; font-size: 12.5px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--t2); transition: all .12s; font-weight: 400; }
.vt-btn:hover { color: var(--text); border-color: var(--border2); }
.vt-btn.active { background: var(--acc); color: #fff; border-color: var(--acc); font-weight: 500; }

/* ── PROJECT CARD GRID ── */
.proj-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 16px; align-items: start; }

.proj-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  display: flex; flex-direction: column;
  transition: box-shadow .15s, border-color .15s, opacity .15s, transform .12s;
  cursor: grab;
}
.proj-card:hover { box-shadow: var(--sh-lg); border-color: var(--border2); }
.proj-card.dragging { opacity: .35; transform: scale(.97); cursor: grabbing; box-shadow: none; }
.proj-card.drag-over { border: 2px dashed var(--acc); background: var(--acc-bg); }
.proj-card.drag-over * { pointer-events: none; }
.proj-card-accent { height: 4px; flex-shrink: 0; }
.proj-card-header { padding: 14px 16px 10px; display: flex; flex-direction: column; gap: 8px; }
.proj-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.proj-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; color: transparent; transition: all .2s; flex-shrink: 0; margin-top: 1px; }
.proj-check:hover { border-color: var(--green); }
.proj-check.done { background: var(--green); border-color: var(--green); color: #fff; }
.proj-title { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; line-height: 1.35; }
.proj-title.struck { text-decoration: line-through; color: var(--t3); font-weight: 400; }
.proj-actions { display: flex; gap: 2px; opacity: 0; transition: opacity .12s; flex-shrink: 0; }
.proj-card:hover .proj-actions { opacity: 1; }
.proj-card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.proj-domain-tag { font-size: 10.5px; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
.proj-date { font-size: 12px; color: var(--t3); white-space: nowrap; }
.proj-date.urg { color: #ef4444; font-weight: 600; }
.proj-date.soon { color: #f59e0b; font-weight: 600; }
.proj-prog { display: flex; align-items: center; gap: 6px; margin-right: auto; }
.proj-prog-bar { width: 48px; height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
.proj-prog-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.proj-prog-txt { font-size: 11px; color: var(--t3); min-width: 26px; text-align: left; }

/* legacy row styles (for fallback) */
.proj-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.proj-meta { display: flex; align-items: center; gap: 8px; margin-right: auto; flex-shrink: 0; }
.proj-expand { font-size: 10px; color: var(--t3); transition: transform .2s; flex-shrink: 0; }
.proj-expand.open { transform: rotate(90deg); }

/* ── SUBTASKS AREA ── */
.subtasks-body { border-top: 1px solid var(--border); background: #faf9f7; padding: 8px 16px 12px 16px; }
.sub-prog-bar-full { height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
.sub-prog-bar-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width .3s; }
.st-item { display: flex; align-items: center; gap: 9px; padding: 6px 6px; border-radius: 6px; transition: background .1s; }
.st-item:hover { background: var(--border); }
.st-check2 { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 9px; color: transparent; transition: all .15s; }
.st-check2:hover { border-color: var(--green); }
.st-check2.done { background: var(--green); border-color: var(--green); color: #fff; }
.st-name { font-size: 13px; flex: 1; color: var(--t2); line-height: 1.35; }
.st-name.struck { text-decoration: line-through; color: var(--t3); }
.st-date-btn { font-size: 11.5px; color: var(--t3); cursor: pointer; white-space: nowrap; padding: 2px 6px; border-radius: 4px; transition: background .1s; border: none; background: none; }
.st-date-btn:hover { background: var(--bg); color: var(--t2); }
.st-date-btn.urg { color: #ef4444; font-weight: 500; }
.st-date-btn.soon { color: #f59e0b; font-weight: 500; }
.st-date-inp { font-size: 11.5px; border: 1px solid var(--acc); border-radius: 4px; padding: 2px 6px; background: var(--surface); color: var(--text); outline: none; }
.st-del2 { background: none; border: none; cursor: pointer; font-size: 11px; color: var(--t3); padding: 2px 5px; opacity: 0; transition: opacity .1s; border-radius: 4px; }
.st-item:hover .st-del2 { opacity: 1; }
.st-del2:hover { color: #ef4444; background: #fee2e2; }
/* inline add subtask */
.st-add-inline { display: flex; align-items: center; gap: 8px; padding: 6px 6px; margin-top: 2px; }
.st-add-circle { width: 16px; height: 16px; border-radius: 50%; border: 1.5px dashed var(--border2); flex-shrink: 0; }
.st-add-input { flex: 1; font-size: 13px; border: none; background: transparent; outline: none; color: var(--text); font-family: var(--font); direction: rtl; }
.st-add-input::placeholder { color: var(--t3); }
.st-add-date { font-size: 11.5px; border: 1px solid var(--border); border-radius: 5px; padding: 3px 7px; background: var(--surface); outline: none; color: var(--t2); }
.st-add-date:focus { border-color: var(--acc); }
.st-add-save { background: var(--acc); color: #fff; border: none; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
.st-add-save:hover { background: #a8573e; }
/* add project row */
.proj-add-row { display: flex; align-items: center; gap: 10px; padding: 11px 16px; cursor: pointer; color: var(--t3); font-size: 13.5px; border: 1.5px dashed var(--border); border-radius: var(--r); transition: all .12s; background: transparent; }
.proj-add-row:hover { color: var(--acc); border-color: var(--acc); background: var(--acc-bg); }

/* ── NOTES WIDGET ── */
/* all dblclick-editable elements show a subtle underline on hover */
[title="לחץ פעמיים לעריכה"]:hover {
  text-decoration: underline dotted var(--t3);
  text-underline-offset: 3px;
  cursor: text;
}

.notes-textarea {
  width: 100%; min-height: 140px; border: none; outline: none;
  font-size: 13.5px; font-family: var(--font); color: var(--text);
  background: transparent; resize: vertical; direction: rtl;
  line-height: 1.65; padding: 0;
}
.notes-textarea::placeholder { color: var(--t3); }

/* ── LAYOUT EDITOR ── */
.edit-mode-bar {
  background: #fef9c3; border-bottom: 1px solid #fde68a;
  padding: 7px 28px; display: flex; align-items: center; gap: 12px;
  font-size: 12.5px; color: #78350f; flex-shrink: 0;
}
.edit-mode-bar strong { font-weight: 600; }
.edit-mode-bar button { font-size: 12px; padding: 4px 12px; border-radius: 6px; cursor: pointer; border: 1px solid #fde68a; background: #fff; color: #78350f; font-weight: 500; }
.edit-mode-bar button:hover { background: #fef3c7; }
.edit-mode-bar .done-btn { background: #78350f; color: #fff; border-color: #78350f; }
.edit-mode-bar .done-btn:hover { background: #5a2a0a; }

/* drag handle — always shown on hover */
.widget-drag-handle-bar {
  display: flex; align-items: center; justify-content: center;
  height: 18px; cursor: grab; color: var(--t3); font-size: 14px;
  letter-spacing: 2px; opacity: 0; transition: opacity .15s;
  border-radius: var(--r) var(--r) 0 0; user-select: none;
}
.widget-wrap:hover .widget-drag-handle-bar { opacity: 1; }
.widget-drag-handle-bar:active { cursor: grabbing; }

/* widget wrapper in layout edit mode */
.widget-wrap {
  position: relative;
  transition: grid-column .15s;
}
.layout-editing .widget-wrap {
  cursor: grab;
  outline: 2px dashed transparent;
  border-radius: var(--r);
  transition: outline .12s, background .12s;
}
.layout-editing .widget-wrap:hover { outline-color: var(--acc); background: var(--acc-bg); }
.layout-editing .widget-wrap.dragging { opacity: .35; cursor: grabbing; outline-color: var(--acc); }
.layout-editing .widget-wrap.drop-target { outline: 2.5px dashed var(--acc); background: #eef; }

/* edit handle bar (inside widget in edit mode) */
.widget-edit-bar {
  display: none; align-items: center; justify-content: space-between;
  padding: 5px 10px; background: var(--acc-bg); border-radius: var(--r) var(--r) 0 0;
  border-bottom: 1px solid var(--acc); gap: 8px;
}
.layout-editing .widget-edit-bar { display: flex; }
.widget-drag-handle {
  font-size: 12px; color: var(--acc); font-weight: 600; cursor: grab;
  display: flex; align-items: center; gap: 5px; user-select: none;
}
.widget-size-btns { display: flex; gap: 3px; }
.wsz-btn {
  border: 1px solid var(--border); background: var(--surface); border-radius: 4px;
  padding: 2px 7px; font-size: 11px; cursor: pointer; color: var(--t2); transition: all .1s;
}
.wsz-btn:hover, .wsz-btn.active { background: var(--acc); color: #fff; border-color: var(--acc); }

/* card edit overlay */
.layout-editing .proj-card { outline: 2px dashed transparent; transition: outline .12s, opacity .15s, transform .12s; }
.layout-editing .proj-card:hover { outline: 2px dashed var(--acc); }
.card-size-bar {
  display: none; background: var(--acc-bg); padding: 5px 10px; gap: 6px;
  align-items: center; border-top: 1px solid var(--acc);
}
.layout-editing .card-size-bar { display: flex; }


/* ══ MOBILE RESPONSIVE (768px and below) ══ */
@media (max-width: 768px) {
  /* Hide sidebar on mobile */
  #sb {
    display: none;
    width: 0;
    overflow: hidden;
  }

  /* Main content takes full width */
  #main {
    flex: 1;
    width: 100%;
    min-width: 0;
  }

  /* Content padding for mobile */
  #content {
    padding: 0 16px 80px;
  }

  /* Cover section adjustments */
  .cover-section {
    margin: 0 -16px;
    width: calc(100% + 32px);
  }

  .cover-img-wrap {
    height: 120px;
  }

  .cover-domain-name {
    right: 16px;
    font-size: 18px;
  }

  /* Make buttons and inputs mobile-friendly */
  button, input[type="button"], input[type="submit"], .btn {
    min-height: 44px;
    font-size: 16px;
    padding: 12px 16px;
    border-radius: 8px;
  }

  /* Forms stack vertically on mobile */
  .frow {
    grid-template-columns: 1fr;
    gap: 12px;
  }

  /* Floating action button positioning */
  .fab {
    bottom: 20px;
    left: 20px;
    width: 56px;
    height: 56px;
    font-size: 28px;
  }

  /* Modal adjustments */
  .modal {
    width: 95%;
    max-width: 95%;
    max-height: 95vh;
    border-radius: 12px;
  }

  /* Table responsive */
  .task-table {
    font-size: 13px;
  }

  .task-table th,
  .task-table td {
    padding: 10px 8px;
  }

  /* Text sizes for readability */
  body {
    font-size: 14px;
  }

  h1, h2, h3 {
    font-size: 16px;
  }

  /* Home page cover */
  .home-cover {
    height: 140px;
    margin: 0 -16px;
    width: calc(100% + 32px);
  }

  .home-emoji {
    font-size: 40px;
    margin-top: -20px;
  }

  .home-title {
    font-size: 24px;
  }

  /* View toggle bar */
  .view-toggle-bar {
    padding: 12px 16px 0;
  }

  /* Project cards on mobile */
  .proj-card-grid {
    grid-template-columns: 1fr;
    gap: 12px;
  }

  /* Upcoming chips */
  .upcoming-chips {
    flex-direction: column;
  }

  .up-chip {
    width: 100%;
  }

  /* Day tabs */
  .day-tabs {
    flex-wrap: wrap;
    gap: 4px;
  }

  .day-tab {
    padding: 4px 12px;
    font-size: 12px;
  }

  /* Sidebar search stays visible if sidebar ever shows */
  .sb-search input {
    font-size: 16px;
  }

  /* Canvas widgets hide on very small screens */
  .home-canvas {
    min-width: auto;
  }

  /* Widget adjustments */
  .widget {
    border: none;
    border-radius: 8px;
  }

  /* Inline add row */
  .inline-input-wrap {
    padding: 8px 10px;
    gap: 6px;
  }

  .inline-task-input {
    font-size: 16px;
    min-height: 44px;
  }

  /* Edit mode bar on mobile */
  .edit-mode-bar {
    padding: 8px 16px;
    flex-wrap: wrap;
  }

  .edit-mode-bar button {
    min-height: 36px;
  }

  /* Status badge sizing */
  .sts-badge {
    font-size: 11px;
    padding: 4px 8px;
  }

  /* Today tasks widget */
  .today-task-item {
    gap: 8px;
    padding: 8px 0;
  }

  /* Goals widget */
  .goal-item {
    gap: 10px;
    padding: 8px 0;
  }

  /* Questions widget */
  .q-item {
    gap: 6px;
    padding: 6px 0;
  }

  /* Toasts positioning */
  #toasts {
    bottom: 16px;
    left: 16px;
  }

  .toast {
    font-size: 12px;
    padding: 8px 12px;
  }
}

/* ══ EXTRA SMALL SCREENS (480px and below) ══ */
@media (max-width: 480px) {
  #content {
    padding: 0 12px 70px;
  }

  .cover-section {
    margin: 0 -12px;
    width: calc(100% + 24px);
  }

  .fab {
    width: 52px;
    height: 52px;
    font-size: 24px;
  }

  .home-title {
    font-size: 20px;
  }

  .home-emoji {
    font-size: 32px;

    padding: 10px 12px 0;
  }

    width: 98%;
    max-width: 98%;
  }

  button, input[type="button"], input[type="submit"], .btn {

    padding: 10px 12px;

  /* Reduce table padding */
  .task-table th,
  .task-table td {
    padding: 8px 6px;
  }

  .task-table th:first-child,
  .task-table td:first-child {
    width: 32px;
  }

  /* Smaller font for table on tiny screens */
  .task-table {
    font-size: 12px;
  }

  /* Shrink inline controls */
  .inline-sel,
  .inline-date-in {
    max-width: 90px;
    font-size: 11px;
  }

  /* Header padding */
  .home-header {
    padding: 0 12px 16px;
  }

  /* Toasts smaller on very small screens */
  .toast {
    font-size: 11px;
    padding: 6px 10px;
  }

  /* Row title smaller */
  .row-title {
    font-size: 13px;
  }

  /* Project title smaller */
  .proj-title {
    font-size: 13px;
  }
}

function makeEditable(el, getValue, setValue, multiline) {
  el.style.cursor = 'text';
  el.title = 'לחץ פעמיים לעריכה';
  el.ondblclick = e => {
    e.stopPropagation();
    const tag = multiline ? 'textarea' : 'input';
    const inp = document.createElement(tag);
    inp.value = getValue();
    const base = 'border:none;border-bottom:1.5px solid var(--acc);outline:none;background:transparent;color:var(--text);font-family:var(--font);direction:rtl;padding:1px 0;width:100%;';
    inp.style.cssText = base + (multiline ? 'resize:none;' : '');
    inp.style.fontSize = getComputedStyle(el).fontSize;
    inp.style.fontWeight = getComputedStyle(el).fontWeight;
    if(multiline) { inp.rows = 2; }
    el.replaceWith(inp); inp.focus(); inp.select();
    function fin() { const v = inp.value.trim(); setValue(v || getValue()); }
    inp.onblur = fin;
    inp.onkeydown = ev => {
      if(ev.key === 'Enter' && !multiline) { ev.preventDefault(); inp.blur(); }
      if(ev.key === 'Escape') { inp.value = getValue(); inp.blur(); }
    };
  };
}

// ── COVER DRAG ────────────────────────────────────────────────────
function applyCoverStyle(el, imgSrc, pid) {
  const pos = positions[pid] || {x:50, y:50};
  if(imgSrc) {
    el.style.backgroundImage = `url(${imgSrc})`;
    el.style.backgroundSize = 'cover';
    el.style.backgroundPosition = `${pos.x}% ${pos.y}%`;
  }
}

function enableCoverDrag(el, pid) {
  if(!images[pid]) return;
  el.classList.add('cover-has-image');

  // drag-to-reposition hint
  const hint = document.createElement('div');
  hint.className = 'cover-drag-hint';
  hint.innerHTML = '↕↔ גרור כדי לשנות את המיקום';
  el.appendChild(hint);

  el.addEventListener('mousedown', e => {
    if(e.target.closest('label,button,input')) return;
    e.preventDefault();
    const pos0 = positions[pid] || {x:50, y:50};
    let startX = e.clientX, startY = e.clientY;
    let cx = pos0.x, cy = pos0.y;
    el.classList.add('cover-dragging');

    function onMove(ev) {
      const dx = ev.clientX - startX;
      const dy = ev.clientY - startY;
      // sensitivity: 100px mouse travel ≈ 15% position change
      cx = Math.max(0, Math.min(100, pos0.x - dx * 0.15));
      cy = Math.max(0, Math.min(100, pos0.y - dy * 0.15));
      el.style.backgroundPosition = `${cx}% ${cy}%`;
    }
    function onUp() {
      el.classList.remove('cover-dragging');
      positions[pid] = {x: Math.round(cx*10)/10, y: Math.round(cy*10)/10};
      savePositions();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // touch support
  el.addEventListener('touchstart', e => {
    if(e.target.closest('label,button,input')) return;
    const touch = e.touches[0];
    const pos0 = positions[pid] || {x:50, y:50};
    let startX = touch.clientX, startY = touch.clientY;
    let cx = pos0.x, cy = pos0.y;

    function onTouchMove(ev) {
      ev.preventDefault();
      const t = ev.touches[0];
      const dx = t.clientX - startX, dy = t.clientY - startY;
      cx = Math.max(0, Math.min(100, pos0.x - dx * 0.15));
      cy = Math.max(0, Math.min(100, pos0.y - dy * 0.15));
      el.style.backgroundPosition = `${cx}% ${cy}%`;
    }
    function onTouchEnd() {
      positions[pid] = {x: Math.round(cx*10)/10, y: Math.round(cy*10)/10};
      savePositions();
      el.removeEventListener('touchmove', onTouchMove);
      el.removeEventListener('touchend', onTouchEnd);
    }
    el.addEventListener('touchmove', onTouchMove, {passive:false});
    el.addEventListener('touchend', onTouchEnd);
  }, {passive:true});
}

function getDateFilter(tab) {
  const today=new Date(); today.setHours(0,0,0,0);
  const tom=new Date(today); tom.setDate(tom.getDate()+1);
  const weekEnd=new Date(today); weekEnd.setDate(weekEnd.getDate()+14);
  if(tab==='today') return d=>{if(!d)return false;const dt=new Date(d+'T00:00:00');return dt.getTime()===today.getTime();};
  if(tab==='tomorrow') return d=>{if(!d)return false;const dt=new Date(d+'T00:00:00');return dt.getTime()===tom.getTime();};
  if(tab==='week') return d=>{if(!d)return false;const dt=new Date(d+'T00:00:00');return dt>=today&&dt<=weekEnd;};
  return null;
}

  const WIDGET_NAMES = {goals:'3 מטרות',today:'משימות השבוע',cal:'לוח שנה',questions:'שאלות לקרן',notes:'מחשבות והערות'};
  const WIDGET_DEFAULTS = {
    goals:     {x:0,   y:0,   w:260, h:320},
    today:     {x:278, y:0,   w:440, h:500},
    cal:       {x:736, y:0,   w:240, h:320},
    questions: {x:736, y:338, w:240, h:260},
    notes:     {x:0,   y:338, w:720, h:200},
  };
  const widgetBuilders = {
    goals:     ()=>buildGoalsWidget(today),
    today:     ()=>buildTodayWidget(today),
    cal:       ()=>buildMiniCalWidget(today),
    questions: ()=>buildQuestionsWidget(),
    notes:     ()=>buildNotesWidget(),
  };

  if(!layoutCfg.wpos) layoutCfg.wpos = {};
  Object.keys(widgetBuilders).forEach(id=>{
    if(!layoutCfg.wpos[id]) layoutCfg.wpos[id] = {...WIDGET_DEFAULTS[id]};
  });

  Object.keys(widgetBuilders).forEach(id=>{
    const builder = widgetBuilders[id];
    const pos = layoutCfg.wpos[id];
    const cw = document.createElement('div'); cw.className = 'cw';
    cw.style.cssText = `left:${pos.x}px;top:${pos.y}px;width:${pos.w}px;height:${pos.h}px`;

    // move handle with editable name
    const handle = document.createElement('div'); handle.className = 'cw-handle';
    const handleDots = document.createElement('span'); handleDots.className = 'cw-handle-dots'; handleDots.textContent = '⠿';
    const handleName = document.createElement('span'); handleName.className = 'cw-handle-name';
    const defaultName = WIDGET_NAMES[id]||id;
    handleName.textContent = widgetNames[id] || defaultName;
    makeEditable(handleName, ()=>widgetNames[id]||defaultName, v=>{ widgetNames[id]=v; saveWidgetNames(); render(); });
    handle.append(handleDots, handleName);
    cw.appendChild(handle);

    // content
    const inner = document.createElement('div'); inner.className = 'cw-inner';
    inner.appendChild(builder());
    cw.appendChild(inner);

    // ── DRAG to move ──
    handle.addEventListener('mousedown', e=>{
      if(e.button!==0) return; e.preventDefault();
      const startX=e.clientX, startY=e.clientY;
      const ox=pos.x, oy=pos.y;
      cw.classList.add('cw-dragging'); cw.style.zIndex=100;
      function onMove(e){
        pos.x=Math.max(0,ox+(e.clientX-startX));
        pos.y=Math.max(0,oy+(e.clientY-startY));
        cw.style.left=pos.x+'px'; cw.style.top=pos.y+'px';
      }
      function onUp(){ cw.classList.remove('cw-dragging'); cw.style.zIndex=''; saveLayout(); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); }
      document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
    });

    // ── RESIZE ── 3 handles
    function makeResizeHandle(cls, onMoveFn) {
      const rh=document.createElement('div'); rh.className=`cw-rh ${cls}`; cw.appendChild(rh);
      rh.addEventListener('mousedown', e=>{
        if(e.button!==0) return; e.preventDefault(); e.stopPropagation();
        const startX=e.clientX, startY=e.clientY;
        const sw=pos.w, sh=pos.h, ox=pos.x;
        cw.classList.add('cw-resizing');
        function onMove(e){ onMoveFn(e.clientX-startX, e.clientY-startY, sw, sh, ox); cw.style.width=pos.w+'px'; cw.style.height=pos.h+'px'; cw.style.left=pos.x+'px'; }
        function onUp(){ cw.classList.remove('cw-resizing'); saveLayout(); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); }
        document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
      });
    }
    // bottom-right: drag right → wider, drag down → taller
    makeResizeHandle('cw-rh-br', (dx,dy,sw,sh)=>{ pos.w=Math.max(200,sw+dx); pos.h=Math.max(120,sh+dy); });
    // bottom-left: drag left → wider (moves left edge), drag down → taller
    makeResizeHandle('cw-rh-bl', (dx,dy,sw,sh,ox)=>{ const nw=Math.max(200,sw-dx); pos.x=ox+sw-nw; pos.w=nw; pos.h=Math.max(120,sh+dy); });
    // bottom edge: drag down → taller only
    makeResizeHandle('cw-rh-b',  (dx,dy,sw,sh)=>{ pos.h=Math.max(120,sh+dy); });

    canvas.appendChild(cw);
  });

  canvasWrap.appendChild(canvas);
  container.appendChild(canvasWrap);

}

function buildMiniCalWidget(today) {
  const w = document.createElement('div'); w.className = 'widget';
  const wHdr = document.createElement('div'); wHdr.className = 'widget-hdr'; wHdr.textContent = widgetNames['cal_hdr']||'לוח שנה';
  makeEditable(wHdr,()=>widgetNames['cal_hdr']||'לוח שנה',v=>{widgetNames['cal_hdr']=v;saveWidgetNames();render();});
  const wBody = document.createElement('div'); wBody.className = 'widget-body'; wBody.style.padding = '12px 14px';

  const nav = document.createElement('div'); nav.className = 'mini-cal-nav';
  const prevBtn = document.createElement('button'); prevBtn.type='button'; prevBtn.className='mini-cal-btn'; prevBtn.textContent='‹';
  prevBtn.onclick=()=>{homeCalMonth--;if(homeCalMonth<0){homeCalMonth=11;homeCalYear--;}render();};
  const nextBtn = document.createElement('button'); nextBtn.type='button'; nextBtn.className='mini-cal-btn'; nextBtn.textContent='›';
  nextBtn.onclick=()=>{homeCalMonth++;if(homeCalMonth>11){homeCalMonth=0;homeCalYear++;}render();};
  const MO_HE = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const monthLbl = document.createElement('span'); monthLbl.className = 'mini-cal-month'; monthLbl.textContent = `${MO_HE[homeCalMonth]} ${homeCalYear}`;
  nav.append(prevBtn, monthLbl, nextBtn);
  wBody.appendChild(nav);

  // collect task dates for dots
  const taskDates = new Set();
  S.tasks.forEach(t=>{
    if(t.endDate) taskDates.add(t.endDate);
    (t.subtasks||[]).forEach(st=>{if(st.date) taskDates.add(st.date);});
  });

  const dayGrid = document.createElement('div'); dayGrid.className = 'mini-cal-grid';
  ['א','ב','ג','ד','ה','ו','ש'].forEach(d=>{const dn=document.createElement('div');dn.className='mini-cal-dn';dn.textContent=d;dayGrid.appendChild(dn);});
  const firstDay = new Date(homeCalYear, homeCalMonth, 1).getDay();
  const daysIn = new Date(homeCalYear, homeCalMonth+1, 0).getDate();
  const prevDays = new Date(homeCalYear, homeCalMonth, 0).getDate();
  let day=1, nd=1;
  for(let w2=0;w2<6;w2++){
    if(w2>0&&day>daysIn) break;
    for(let wd=0;wd<7;wd++){
      const idx=w2*7+wd; let date, other=false;
      if(idx<firstDay){date=prevDays-firstDay+idx+1;other=true;}
      else if(day>daysIn){date=nd++;other=true;}
      else date=day++;
      const isToday=!other&&date===today.getDate()&&homeCalMonth===today.getMonth()&&homeCalYear===today.getFullYear();
      const ds=!other?`${homeCalYear}-${String(homeCalMonth+1).padStart(2,'0')}-${String(date).padStart(2,'0')}`:'';
      const hasTasks=ds&&taskDates.has(ds);
      const cell=document.createElement('div');
      cell.className='mini-cal-day'+(other?' other-month':'')+(isToday?' today':'')+(hasTasks?' has-tasks':'');
      cell.textContent=date;
      dayGrid.appendChild(cell);
    }
  }
  wBody.appendChild(dayGrid);
  w.appendChild(wBody);
  return w;
}

function buildTodayWidget(today) {
  // week range: today through today+6
  const weekStart = new Date(today); weekStart.setHours(0,0,0,0);
  const weekEnd   = new Date(weekStart); weekEnd.setDate(weekStart.getDate()+6);
  function inWeek(d) {
    if(!d) return false;
    const dt = new Date(d+'T00:00:00');
    return dt >= weekStart && dt <= weekEnd;
  }

  const w = document.createElement('div'); w.className = 'widget';
  const wHdr = document.createElement('div'); wHdr.className = 'widget-hdr';
  wHdr.textContent = widgetNames['today_hdr']||'משימות השבוע';
  makeEditable(wHdr,()=>widgetNames['today_hdr']||'משימות השבוע',v=>{widgetNames['today_hdr']=v;saveWidgetNames();render();});
  const wBody = document.createElement('div'); wBody.className = 'widget-body';

  // collect this week's items (subtasks + standalone tasks)
  const weekItems = [];
  S.tasks.forEach(t=>{
    const p = proj(t.projectId);
    if(t.subtasks&&t.subtasks.length){
      t.subtasks.forEach(st=>{
        const d = st.date || t.endDate || '';
        if(inWeek(d))
          weekItems.push({type:'sub',id:st.id,tid:t.id,title:st.title,done:st.done,proj:p.name,color:p.color,date:d});
      });
    } else if(inWeek(t.endDate)) {
      weekItems.push({type:'task',id:t.id,tid:t.id,title:t.title,done:t.status==='done',proj:p.name,color:p.color,date:t.endDate});
    }
  });

  // assign compound keys
  weekItems.forEach(item=>{
    item.key = item.type==='sub' ? `sub:${item.id}:${item.tid}` : `task:${item.tid}`;
  });

  // ensure weeklyOrder contains all current items (add new ones at the end)
  const currentKeys = weekItems.map(i=>i.key);
  // remove stale keys
  weeklyOrder = weeklyOrder.filter(k=>currentKeys.includes(k));
  // add new keys not yet in order (sorted by date by default)
  const newItems = weekItems.filter(i=>!weeklyOrder.includes(i.key));
  newItems.sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    return(a.date||'').localeCompare(b.date||'');
  });
  newItems.forEach(i=>weeklyOrder.push(i.key));

  // sort weekItems by weeklyOrder, keeping done at bottom
  const undone = weekItems.filter(i=>!i.done);
  const done2  = weekItems.filter(i=>i.done);
  const sortByOrder = arr=>arr.sort((a,b)=>weeklyOrder.indexOf(a.key)-weeklyOrder.indexOf(b.key));
  sortByOrder(undone); sortByOrder(done2);
  weekItems.splice(0, weekItems.length, ...undone, ...done2);

  const taskList=document.createElement('div');
  if(!weekItems.length){
    const em=document.createElement('div');em.className='today-empty';em.textContent='אין משימות השבוע ✓';taskList.appendChild(em);
  } else {
    let shownDoneSep = false;
    weekItems.forEach(item=>{
      if(item.done && !shownDoneSep) {
        shownDoneSep = true;
        const sep=document.createElement('div');sep.style.cssText='height:1px;background:var(--border);margin:6px 0 4px';taskList.appendChild(sep);
      }
      const row=document.createElement('div');row.className='today-task-item';
      if(item.done) row.style.opacity='.5';

      // drag handle
      const dragHandle=document.createElement('div');
      dragHandle.style.cssText='flex-shrink:0;opacity:0;transition:opacity .12s;cursor:grab;padding:4px 6px;color:var(--t3);font-size:14px;line-height:1;user-select:none;letter-spacing:1px';
      dragHandle.textContent='⠿';
      row.addEventListener('mouseenter',()=>dragHandle.style.opacity='1');
      row.addEventListener('mouseleave',()=>dragHandle.style.opacity='0');

      // drag only activates when starting from the handle
      row.draggable=false; // disabled by default — enabled only on handle mousedown
      row.dataset.key=item.key;
      dragHandle.addEventListener('mousedown',()=>{ row.draggable=true; });
      document.addEventListener('mouseup',()=>{ row.draggable=false; },{once:false});
      row.addEventListener('dragstart',e=>{
        if(!row.draggable){e.preventDefault();return;}
        e.dataTransfer.effectAllowed='move';
        e.dataTransfer.setData('text/plain',item.key);
        row.style.opacity='.4';
      });
      row.addEventListener('dragend',()=>{
        row.style.opacity='';
        document.querySelectorAll('.today-task-item').forEach(r=>r.style.borderTop='');
      });
      row.addEventListener('dragover',e=>{
        e.preventDefault(); e.dataTransfer.dropEffect='move';
        row.style.borderTop='2px solid var(--acc)';
      });
      row.addEventListener('dragleave',e=>{
        if(!row.contains(e.relatedTarget)) row.style.borderTop='';
      });
      row.addEventListener('drop',e=>{
        e.preventDefault(); row.style.borderTop='';
        const fromKey=e.dataTransfer.getData('text/plain');
        const toKey=item.key;
        if(!fromKey||fromKey===toKey)return;
        const fi=weeklyOrder.indexOf(fromKey), ti=weeklyOrder.indexOf(toKey);
        if(fi===-1||ti===-1)return;
        weeklyOrder.splice(fi,1);
        const newTi=weeklyOrder.indexOf(toKey);
        weeklyOrder.splice(newTi,0,fromKey);
        saveWeeklyOrder(); render();
      });

      const chk=document.createElement('div');chk.className='today-chk'+(item.done?' done':'');chk.textContent='✓';
      chk.onclick=()=>{if(item.type==='sub')toggleSubtask(item.tid,item.id);else toggleDone(item.tid);};
      const info=document.createElement('div');info.className='today-task-info';
      const name=document.createElement('div');name.className='today-task-name'+(item.done?' struck':'');name.textContent=item.title;
      const meta=document.createElement('div');meta.style.cssText='display:flex;align-items:center;gap:8px';
      const prj=document.createElement('div');prj.className='today-task-proj';prj.style.color=item.color;prj.textContent=item.proj;
      const dl=daysLeft(item.date);
      const dtEl=document.createElement('span');
      dtEl.style.cssText=`font-size:11px;color:${dl<0?'#ef4444':dl===0?'var(--acc)':'var(--t3)'};cursor:text;`;
      dtEl.textContent=item.date?(dl<0?`⚠️ ${fmtDate(item.date)}`:dl===0?'היום':dl===1?'מחר':fmtDate(item.date)):'＋ תאריך';
      dtEl.title='לחץ פעמיים לעריכת תאריך';
      dtEl.ondblclick=e=>{
        e.stopPropagation();
        const inp=document.createElement('input'); inp.type='date';
        if(item.date) inp.value=item.date;
        inp.style.cssText='font-size:11px;border:1px solid var(--acc);border-radius:5px;padding:2px 6px;background:var(--surface);color:var(--text);outline:none;';
        dtEl.replaceWith(inp); inp.focus();
        function fin(){
          const v=inp.value;
          if(item.type==='sub'){
            const task=S.tasks.find(x=>x.id===item.tid);
            if(task){const st=task.subtasks.find(s=>s.id===item.id);if(st)st.date=v;}
          } else {
            const task=S.tasks.find(x=>x.id===item.tid);
            if(task)task.endDate=v;
          }
          save(); render();
        }
        inp.onchange=fin; inp.onblur=fin;
        inp.onkeydown=ev=>{if(ev.key==='Enter')fin();if(ev.key==='Escape')render();};
      };
      meta.append(prj,dtEl);
      // double-click on name to edit (no button)
      name.style.cursor='text';
      name.ondblclick=e=>{
        e.stopPropagation();
        const inp=document.createElement('input');
        inp.style.cssText='font-size:14px;border:none;border-bottom:1.5px solid var(--acc);outline:none;background:transparent;color:var(--text);font-family:var(--font);direction:rtl;width:100%;';
        inp.value=item.title;
        name.replaceWith(inp); inp.focus(); inp.select();
        function finEdit(){
          const v=inp.value.trim();
          if(item.type==='sub'){const task=S.tasks.find(x=>x.id===item.tid);if(task&&v){const st=task.subtasks.find(s=>s.id===item.id);if(st)st.title=v;}}
          else{const task=S.tasks.find(x=>x.id===item.tid);if(task&&v)task.title=v;}
          save(); render();
        }
        inp.onblur=finEdit;
        inp.onkeydown=e=>{if(e.key==='Enter')finEdit();if(e.key==='Escape')render();};
      };
      info.append(name,meta);row.append(dragHandle,chk,info);taskList.appendChild(row);
    });
    const doneC=weekItems.filter(i=>i.done).length;
    const cnt=document.createElement('div');cnt.className='today-count';
    cnt.textContent=`${doneC} מתוך ${weekItems.length} הושלמו`;taskList.appendChild(cnt);
  }

  // assemble: + button → inline form (hidden) → scrollable list
  const topBar=document.createElement('div');
  topBar.style.cssText='display:flex;align-items:center;justify-content:flex-end;padding:0 0 8px;border-bottom:1px solid var(--border);margin-bottom:8px';
  const addToggleBtn=document.createElement('button');
  addToggleBtn.type='button';
  addToggleBtn.style.cssText='background:var(--acc);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .12s;flex-shrink:0';
  addToggleBtn.textContent='＋';
  addToggleBtn.title='הוסף משימה';
  addToggleBtn.onmouseenter=()=>addToggleBtn.style.background='#a8573e';
  addToggleBtn.onmouseleave=()=>addToggleBtn.style.background='var(--acc)';
  topBar.appendChild(addToggleBtn);

  // inline add form (hidden by default)
  const addFormWrap=document.createElement('div');
  addFormWrap.style.cssText='overflow:hidden;max-height:0;transition:max-height .2s ease;margin-bottom:0';
  const addFormInner=document.createElement('div');
  addFormInner.style.cssText='padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:8px';
  appendTodayAddRow(addFormInner);
  addFormWrap.appendChild(addFormInner);

  let addOpen=false;
  addToggleBtn.onclick=()=>{
    addOpen=!addOpen;
    addFormWrap.style.maxHeight=addOpen?'200px':'0';
    addToggleBtn.textContent=addOpen?'✕':'＋';
    if(addOpen) setTimeout(()=>addFormInner.querySelector('input')?.focus(),220);
  };

  wBody.appendChild(topBar);
  wBody.appendChild(addFormWrap);
  taskList.style.cssText='flex:1;min-height:0;overflow-y:auto;';
  wBody.style.cssText='padding:14px 16px;display:flex;flex-direction:column;flex:1;min-height:0;';
  wBody.appendChild(taskList);

  w.appendChild(wBody);
  return w;
}

function appendTodayAddRow(parent) {
  const form = document.createElement('div'); form.className = 'today-add-form';
  const lbl = document.createElement('div'); lbl.className = 'today-add-label'; lbl.textContent = 'הוספת משימה';
  const inp = document.createElement('input'); inp.className = 'today-add-inp';
  inp.placeholder = 'שם המשימה...'; inp.dir = 'rtl';

  // row 1: domain + date
  const row1 = document.createElement('div'); row1.className = 'today-add-meta';
  const domSel = document.createElement('select'); domSel.className = 'today-add-sel';
  S.projects.forEach(p => { const o=document.createElement('option'); o.value=p.id; o.textContent=p.name; domSel.appendChild(o); });
  const dateIn = document.createElement('input'); dateIn.type='date'; dateIn.className='today-add-date';
  dateIn.value = todayStr();
  row1.append(domSel, dateIn);

  // row 2: project (within domain)
  const row2 = document.createElement('div'); row2.className = 'today-add-meta'; row2.style.marginTop = '2px';
  const projSel = document.createElement('select'); projSel.className = 'today-add-sel'; projSel.style.flex = '1';

  function refreshProjects() {
    projSel.innerHTML = '';
    const none = document.createElement('option'); none.value = ''; none.textContent = '— ללא פרויקט ספציפי —'; projSel.appendChild(none);
    S.tasks.filter(t => t.projectId === domSel.value && t.subtasks !== undefined)
      .forEach(t => { const o=document.createElement('option'); o.value=t.id; o.textContent=t.title; projSel.appendChild(o); });
  }
  refreshProjects();
  domSel.onchange = refreshProjects;
  row2.appendChild(projSel);

  const saveBtn = document.createElement('button'); saveBtn.type='button'; saveBtn.className='today-add-save'; saveBtn.textContent='＋ הוסף';
  form.append(lbl, inp, row1, row2, saveBtn);
  parent.appendChild(form);

  function doSave() {
    const title = inp.value.trim(); if(!title){inp.focus();return;}
    const targetProjId = projSel.value; // empty = standalone task
    if(targetProjId) {
      // add as subtask to existing project
      const parentTask = S.tasks.find(t=>t.id===targetProjId);
      if(parentTask) {
        if(!parentTask.subtasks) parentTask.subtasks = [];
        parentTask.subtasks.push({id:uid(), title, done:false, date: dateIn.value||todayStr()});
      }
    } else {
      // add as standalone task in domain
      S.tasks.push({id:uid(), title, projectId:domSel.value, status:'todo',
        startDate:'', endDate:dateIn.value||todayStr(), priority:'medium', owner:'', notes:'', subtasks:[]});
    }
    inp.value=''; dateIn.value=todayStr(); projSel.value='';
    save(); renderSidebar(); render();
  }
  saveBtn.onclick = doSave;
  inp.onkeydown = e => { if(e.key==='Enter') doSave(); };
}

function buildGoalsWidget(today) {
  const key=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const MO_HE = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  if(!goals[key]) goals[key]=['','',''];
  const g=goals[key];

  const w=document.createElement('div');w.className='widget';
  const wHdr=document.createElement('div');wHdr.className='widget-hdr';
  wHdr.textContent=`3 מטרות – ${MO_HE[today.getMonth()]}`;
  const wBody=document.createElement('div');wBody.className='widget-body';

  g.forEach((goalText, i)=>{
    const item=document.createElement('div');item.className='goal-item';
    const num=document.createElement('div');num.className=`goal-num g${i+1}`;num.textContent=i+1;
    const inp=document.createElement('textarea');inp.className='goal-input';
    inp.placeholder=`מטרה ${i+1}...`;inp.value=goalText;inp.rows=1;
    inp.oninput=()=>{g[i]=inp.value;saveGoals();inp.style.height='auto';inp.style.height=inp.scrollHeight+'px';};
    inp.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();const next=wBody.querySelectorAll('.goal-input')[i+1];if(next)next.focus();}};
    setTimeout(()=>{inp.style.height='auto';inp.style.height=Math.max(20,inp.scrollHeight)+'px';},0);
    item.append(num,inp);wBody.appendChild(item);
  });
  w.appendChild(wBody);
  return w;
}

function buildQuestionsWidget() {
  const w = document.createElement('div'); w.className = 'widget';
  const wHdr = document.createElement('div'); wHdr.className = 'widget-hdr';
  wHdr.textContent = widgetNames['q_hdr']||'שאלות לקרן';
  makeEditable(wHdr,()=>widgetNames['q_hdr']||'שאלות לקרן',v=>{widgetNames['q_hdr']=v;saveWidgetNames();render();});

  if(!questions.length){
    const em=document.createElement('div');
    em.style.cssText='font-size:12.5px;color:var(--t3);padding:4px 0 10px';
    em.textContent='אין שאלות עדיין';wBody.appendChild(em);
  } else {
    questions.forEach(q=>{
      const item=document.createElement('div');item.className='q-item';
      const chk=document.createElement('div');chk.className='q-check'+(q.asked?' asked':'');chk.textContent='✓';
      chk.onclick=()=>{q.asked=!q.asked;saveQuestions();render();};

      // editable text — double-click to edit
      const txt=document.createElement('div');
      txt.className='q-text'+(q.asked?' asked-txt':'');
      txt.textContent=q.text;
      txt.title='לחץ פעמיים לעריכה';
      txt.style.cursor='text';
      txt.ondblclick=e=>{
        e.stopPropagation();
        const inp=document.createElement('input');
        inp.value=q.text;
        inp.style.cssText='flex:1;font-size:13px;border:none;border-bottom:1.5px solid var(--acc);outline:none;background:transparent;color:var(--text);font-family:var(--font);direction:rtl;width:100%;padding:1px 0;';
        txt.replaceWith(inp); inp.focus(); inp.select();
        function fin(){const v=inp.value.trim();if(v)q.text=v;saveQuestions();render();}
        inp.onblur=fin;
        inp.onkeydown=ev=>{if(ev.key==='Enter'){ev.preventDefault();fin();}if(ev.key==='Escape'){inp.value=q.text;fin();}};
      };

      const del=document.createElement('button');del.className='q-del';del.textContent='✕';
      del.onclick=()=>{questions=questions.filter(x=>x.id!==q.id);saveQuestions();render();};
      item.append(chk,txt,del);wBody.appendChild(item);
    });
  }

  const addRow=document.createElement('div');addRow.className='q-add-row';
  const inp=document.createElement('input');inp.className='q-add-inp';inp.placeholder='שאלה חדשה...';inp.dir='rtl';
  const addBtn=document.createElement('button');addBtn.type='button';addBtn.className='q-add-btn';addBtn.textContent='הוסף';
  function doAdd(){const t=inp.value.trim();if(!t)return;questions.push({id:uid(),text:t,asked:false});inp.value='';saveQuestions();render();}
  addBtn.onclick=doAdd;inp.onkeydown=e=>{if(e.key==='Enter')doAdd();};
  addRow.append(inp,addBtn);wBody.appendChild(addRow);

  w.appendChild(wBody);
  return w;
}
