function buildUpcomingStrip() {
  const strip = document.createElement('div'); strip.className = 'upcoming-strip';
  const hdr = document.createElement('div'); hdr.className = 'upcoming-strip-hdr';
  hdr.textContent = 'הפרויקטים הקרובים';
  strip.appendChild(hdr);

  const upcoming = S.tasks
    .filter(t => t.endDate && t.status !== 'done' && daysLeft(t.endDate) >= 0)
    .sort((a,b) => a.endDate.localeCompare(b.endDate))
    .slice(0, 4);

  if(!upcoming.length){
    const em = document.createElement('div');
    em.style.cssText = 'font-size:13px;color:var(--t3)';
    em.textContent = 'אין פרויקטים קרובים';
    strip.appendChild(em);
    return strip;
  }

  const row = document.createElement('div'); row.className = 'upcoming-chips';
  upcoming.forEach(t => {
    const p = proj(t.projectId);
    const dl = daysLeft(t.endDate);
    const dc = dl < 0 ? 'urg' : dl <= 14 ? 'soon' : '';
    const dtxt = dl < 0 ? `⚠️ ${fmtDate(t.endDate)}` : dl === 0 ? 'היום!' : dl === 1 ? 'מחר' : fmtDate(t.endDate);
    const pr = t.subtasks && t.subtasks.length ? `${t.subtasks.filter(s=>s.done).length}/${t.subtasks.length}` : '';

    const chip = document.createElement('div');
    chip.className = 'up-chip';
    chip.style.cursor = 'pointer';

    const dot = document.createElement('div'); dot.className='up-chip-dot'; dot.style.background=p.color;
    const info = document.createElement('div'); info.style.minWidth='0';
    const name = document.createElement('div'); name.className='up-chip-name'; name.textContent=t.title;
    const meta = document.createElement('div'); meta.style.cssText='display:flex;align-items:center;gap:6px';
    const dateSpan = document.createElement('span'); dateSpan.className=`up-chip-date ${dc}`; dateSpan.textContent=dtxt;
    meta.appendChild(dateSpan);
    if(pr){const prSpan=document.createElement('span');prSpan.style.cssText='font-size:10.5px;color:var(--t3)';prSpan.textContent=pr;meta.appendChild(prSpan);}
    info.append(name, meta);
    chip.append(dot, info);

    chip.addEventListener('click', () => {
      filterDomain(t.projectId);
      S.viewMode = 'projects';
      ['projects','tasks'].forEach(m=>{const b=document.getElementById('vt-'+m);if(b)b.classList.toggle('active',m==='projects');});
    });

    row.appendChild(chip);
  });
  strip.appendChild(row);
  return strip;
}

// ── PROJECTS CARD GRID VIEW ───────────────────────────────────────
let dragTaskId = null;
let dragWidgetId = null;
let isEditMode = false;
let collapsedCards = new Set(); // taskIds whose subtasks are hidden
let layoutCfg = {};

function loadLayout() { try { layoutCfg = JSON.parse(localStorage.getItem('tf3_layout')||'{}'); } catch { layoutCfg={}; } }
function saveLayout() { localStorage.setItem('tf3_layout', JSON.stringify(layoutCfg)); }

function getHomeLayout() {
  const ALL = ['goals','today','cal','questions','notes'];
  if(!layoutCfg.home) layoutCfg.home = ALL.map(id=>({id,span:1}));
  // add any missing widgets to existing layout
  ALL.forEach(id=>{
    if(!layoutCfg.home.find(x=>x.id===id))
      layoutCfg.home.push({id,span:1});
  });
  return layoutCfg.home;
}
function getCardSpan(taskId) { return (layoutCfg.cards&&layoutCfg.cards[taskId])||1; }
function setCardSpan(taskId, span) {
  if(!layoutCfg.cards) layoutCfg.cards={};
  layoutCfg.cards[taskId]=span; saveLayout(); render();
}

function toggleEditMode() {
  isEditMode = !isEditMode;
  const bar = document.getElementById('edit-mode-bar');
  const btn = document.getElementById('edit-layout-btn');
  const main = document.getElementById('main');
  if(bar) bar.style.display = isEditMode ? 'flex' : 'none';
  if(btn) btn.textContent = isEditMode ? '✓ סיום' : '✏️ ערוך פריסה';
  if(main) main.classList.toggle('layout-editing', isEditMode);
  render();
}

// Build a draggable widget wrapper — always draggable, no edit mode required
function wrapWidget(id, el) {
  const wrap = document.createElement('div');
  wrap.className = 'widget-wrap';
  const layout = getHomeLayout();
  const cfg = layout.find(x=>x.id===id) || {span:1};
  wrap.style.gridColumn = `span ${cfg.span}`;
  wrap.dataset.widgetId = id;

  // ── drag handle ── (always visible on hover)
  const handle = document.createElement('div');
  handle.className = 'widget-drag-handle-bar';
  handle.innerHTML = '⠿';
  handle.title = 'גרור להזזה';
  wrap.appendChild(handle);

  // ── size buttons (shown in edit mode only) ──
  if(isEditMode) {
    const sizeBtns = document.createElement('div');
    sizeBtns.className = 'widget-size-btns';
    sizeBtns.style.cssText = 'display:flex;gap:3px;padding:3px 8px 0;justify-content:flex-end';
    [{l:'▣',s:1},{l:'▣▣',s:2}].forEach(({l,s})=>{
      const b=document.createElement('button'); b.type='button'; b.className='wsz-btn'+(cfg.span===s?' active':'');
      b.textContent=l; b.title=`${s} עמודות`;
      b.onclick=e=>{e.stopPropagation();const lo=getHomeLayout();const ci=lo.findIndex(x=>x.id===id);if(ci>-1)lo[ci].span=s;saveLayout();render();};
      sizeBtns.appendChild(b);
    });
    wrap.appendChild(sizeBtns);
  }

  wrap.appendChild(el);

  // ── drag events (always active) ──
  wrap.draggable = true;
  wrap.addEventListener('dragstart', e=>{
    if(e.target.closest('input,textarea,select,button:not(.widget-drag-handle-bar)')) { e.preventDefault(); return; }
    dragWidgetId=id; wrap.classList.add('dragging'); e.dataTransfer.effectAllowed='move';
  });
  wrap.addEventListener('dragend', ()=>{
    wrap.classList.remove('dragging'); dragWidgetId=null;
    document.querySelectorAll('.widget-wrap').forEach(w=>w.classList.remove('drop-target'));
  });
  wrap.addEventListener('dragover', e=>{
    e.preventDefault(); if(dragWidgetId&&dragWidgetId!==id) wrap.classList.add('drop-target');
  });
  wrap.addEventListener('dragleave', e=>{
    if(!wrap.contains(e.relatedTarget)) wrap.classList.remove('drop-target');
  });
  wrap.addEventListener('drop', e=>{
    e.preventDefault(); wrap.classList.remove('drop-target');
    if(!dragWidgetId||dragWidgetId===id) return;
    const lo=getHomeLayout();
    const fi=lo.findIndex(x=>x.id===dragWidgetId), ti=lo.findIndex(x=>x.id===id);
    if(fi>-1&&ti>-1){const [mv]=lo.splice(fi,1); lo.splice(ti,0,mv); saveLayout(); render();}
  });

  return wrap;
}

function renderProjectTimeline(container) {
  // use array order (preserved from drag). Sort button available separately.
  const tasks = filteredTasks();

  if(!tasks.length){
    const em=document.createElement('div');em.className='empty';
    em.innerHTML='<div class="ei">📂</div><h3>אין פרויקטים</h3><p>הוסף פרויקט חדש</p>';
    container.appendChild(em);
  }

  // sort bar
  const sortBar=document.createElement('div');
  sortBar.style.cssText='display:flex;align-items:center;justify-content:flex-end;margin-bottom:12px;gap:8px';
  const sortHint=document.createElement('span');sortHint.style.cssText='font-size:12px;color:var(--t3)';sortHint.textContent='גרור קוביות לשינוי סדר';
  const sortBtn=document.createElement('button');sortBtn.className='btn bg';sortBtn.style.fontSize='12px';sortBtn.style.padding='5px 12px';
  sortBtn.textContent='↕ מיין לפי תאריך';
  sortBtn.onclick=()=>{
    const dom=S.filterDomain;
    const all=S.tasks.filter(t=>!dom||t.projectId===dom);
    all.sort((a,b)=>{if(!a.endDate&&!b.endDate)return 0;if(!a.endDate)return 1;if(!b.endDate)return-1;return a.endDate.localeCompare(b.endDate);});
    // rebuild S.tasks preserving non-filtered
    const others=S.tasks.filter(t=>dom?t.projectId!==dom:false);
    S.tasks=dom?[...others,...all]:[...all];
    save();render();
  };
  sortBar.append(sortHint,sortBtn);
  container.appendChild(sortBar);

  const active = tasks.filter(t=>t.status!=='done');
  const done   = tasks.filter(t=>t.status==='done');

  const grid=document.createElement('div'); grid.className='proj-card-grid';
  active.forEach(t=>{
    const card=buildProjCard(t);
    makeDraggable(card,t.id,grid);
    grid.appendChild(card);
  });

  // ── separator ──
  if(done.length) {
    const sep=document.createElement('div');
    sep.style.cssText=`grid-column:1/-1;display:flex;align-items:center;gap:14px;margin:8px 0 4px`;
    sep.innerHTML=`<div style="flex:1;height:1px;background:var(--border)"></div>
      <span style="font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--t3);white-space:nowrap">✓ הושלמו (${done.length})</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>`;
    grid.appendChild(sep);

    done.forEach(t=>{
      const card=buildProjCard(t);
      card.style.opacity='0.55';
      makeDraggable(card,t.id,grid);
      grid.appendChild(card);
    });
  }

  // add card
  const addCard=document.createElement('div');
  addCard.className='proj-add-row';
  addCard.style.cssText='min-height:120px;justify-content:center;flex-direction:column;gap:6px;text-align:center';
  addCard.innerHTML='<div style="font-size:22px;opacity:.3">＋</div><div>פרויקט חדש</div>';
  addCard.onclick=()=>openTaskModal(S.filterDomain||'');
  grid.appendChild(addCard);
  container.appendChild(grid);
}

function makeDraggable(card, taskId, grid) {
  card.draggable = true;

  card.addEventListener('dragstart', e => {
    dragTaskId = taskId;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', taskId);
  });

  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    dragTaskId = null;
    grid.querySelectorAll('.proj-card').forEach(c=>c.classList.remove('drag-over'));
  });

  card.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if(dragTaskId && dragTaskId !== taskId) card.classList.add('drag-over');
  });

  card.addEventListener('dragleave', e => {
    if(!card.contains(e.relatedTarget)) card.classList.remove('drag-over');
  });

  card.addEventListener('drop', e => {
    e.preventDefault();
    card.classList.remove('drag-over');
    if(!dragTaskId || dragTaskId === taskId) return;
    // reorder in S.tasks
    const fromIdx = S.tasks.findIndex(t=>t.id===dragTaskId);
    const toIdx   = S.tasks.findIndex(t=>t.id===taskId);
    if(fromIdx===-1||toIdx===-1) return;
    const [moved] = S.tasks.splice(fromIdx, 1);
    S.tasks.splice(toIdx, 0, moved);
    save(); render();
  });
}

function buildProjCard(t) {
  const p=proj(t.projectId);
  // sort subtasks: undone first, done last
  const rawSts=t.subtasks||[];
  const sts=[...rawSts.filter(s=>!s.done), ...rawSts.filter(s=>s.done)];
  const done=sts.filter(s=>s.done).length;
  const pct=sts.length?Math.round(done/sts.length*100):0;
  const isDone=t.status==='done';
  const dl=daysLeft(t.endDate);
  const dateCls=t.endDate&&!isDone?(dl<0?'urg':dl<=14?'soon':''):'';
  const dateTxt=t.endDate?(dl<0?`⚠️ ${fmtDate(t.endDate)}`:dl===0?'היום!':dl===1?'מחר':fmtDate(t.endDate)):'ללא תאריך';

  const span = getCardSpan(t.id);
  const card=document.createElement('div'); card.className='proj-card';
  card.style.gridColumn = span > 1 ? `span ${span}` : '';

  // colored top accent
  const accent=document.createElement('div'); accent.className='proj-card-accent'; accent.style.background=p.color;
  card.appendChild(accent);

  const isCollapsed = collapsedCards.has(t.id);

  // header
  const hdr=document.createElement('div'); hdr.className='proj-card-header';
  const top=document.createElement('div'); top.className='proj-card-top';
  const chk=document.createElement('div'); chk.className='proj-check'+(isDone?' done':''); chk.textContent='✓';
  chk.onclick=e=>{e.stopPropagation();toggleDone(t.id);};
  const title=document.createElement('div'); title.className='proj-title'+(isDone?' struck':''); title.textContent=t.title;
  makeEditable(title,()=>t.title,v=>{t.title=v;save();render();});
  const acts=document.createElement('div'); acts.className='proj-actions';

  // collapse toggle button — always visible
  const colBtn=document.createElement('button'); colBtn.type='button'; colBtn.className='icon-btn';
  colBtn.title=isCollapsed?'הצג משימות':'כווץ משימות';
  colBtn.textContent=isCollapsed?'▼':'▲';
  colBtn.style.cssText='opacity:1;font-size:10px;padding:4px 7px;color:var(--t3)';
  colBtn.onclick=e=>{e.stopPropagation();if(collapsedCards.has(t.id))collapsedCards.delete(t.id);else collapsedCards.add(t.id);render();};

  const eBtn=document.createElement('button'); eBtn.className='icon-btn'; eBtn.textContent='✏️'; eBtn.onclick=e=>{e.stopPropagation();openTaskModal('',t.id);};
  const dBtn=document.createElement('button'); dBtn.className='icon-btn'; dBtn.textContent='🗑'; dBtn.onclick=e=>{e.stopPropagation();delTask(t.id);};
  acts.append(colBtn,eBtn,dBtn);
  top.append(chk,title,acts);
  hdr.appendChild(top);

  // meta row
  const meta=document.createElement('div'); meta.className='proj-card-meta';
  const stsBadge=document.createElement('button'); stsBadge.className=`sts-badge ${sCls(t.status)}`; stsBadge.textContent=sLabel(t.status);
  stsBadge.onclick=e=>{e.stopPropagation();cycleStatus(t.id);};
  const dateEl=document.createElement('span'); dateEl.className=`proj-date ${dateCls}`; dateEl.textContent=dateTxt;
  meta.append(stsBadge,dateEl);
  if(sts.length){
    const pg=document.createElement('div');pg.className='proj-prog';
    const pb=document.createElement('div');pb.className='proj-prog-bar';
    const pf=document.createElement('div');pf.className='proj-prog-fill';pf.style.cssText=`width:${pct}%;background:${p.color}`;pb.appendChild(pf);
    const pt=document.createElement('span');pt.className='proj-prog-txt';pt.textContent=`${done}/${sts.length}`;
    pg.append(pb,pt); meta.appendChild(pg);
  }
  hdr.appendChild(meta);
  card.appendChild(hdr);

  // subtasks — visible unless collapsed
  if(!isCollapsed) {
    const stBody=document.createElement('div'); stBody.className='subtasks-body';
    if(sts.length&&pct>0){
      const spb=document.createElement('div');spb.className='sub-prog-bar-full';
      const spf=document.createElement('div');spf.className='sub-prog-bar-fill';spf.style.cssText=`width:${pct}%;background:${p.color}`;spb.appendChild(spf);stBody.appendChild(spb);
    }
    // use original (unsorted) array for reorder ops — sts is display-sorted copy
    const rawStArr = t.subtasks || [];
    let addedDoneSep = false;
    sts.forEach((st, idx)=>{
      if(st.done && !addedDoneSep && done > 0 && done < sts.length) {
        addedDoneSep = true;
        const sep = document.createElement('div');
        sep.style.cssText = 'height:1px;background:var(--border);margin:6px 0 4px;';
        stBody.appendChild(sep);
      }
      const item=document.createElement('div'); item.className='st-item';
      if(st.done) item.style.opacity='.55';

      // ── reorder arrows ──
      const arrows=document.createElement('div');
      arrows.style.cssText='display:flex;flex-direction:column;gap:0;opacity:0;transition:opacity .1s;flex-shrink:0';
      item.addEventListener('mouseenter',()=>arrows.style.opacity='1');
      item.addEventListener('mouseleave',()=>arrows.style.opacity='0');
      const realIdx=()=>rawStArr.findIndex(s=>s.id===st.id);
      const mkArrow=(txt,dir)=>{
        const b=document.createElement('button');b.type='button';
        b.style.cssText='background:none;border:none;cursor:pointer;font-size:9px;color:var(--t3);padding:1px 3px;line-height:1;';
        b.textContent=txt;
        b.onmouseenter=()=>b.style.color='var(--acc)';
        b.onmouseleave=()=>b.style.color='var(--t3)';
        b.onclick=e=>{e.stopPropagation();
          const ri=realIdx(); const ni=ri+dir;
          if(ni<0||ni>=rawStArr.length)return;
          [rawStArr[ri],rawStArr[ni]]=[rawStArr[ni],rawStArr[ri]];
          save();render();};
        return b;
      };
      arrows.append(mkArrow('▲',-1), mkArrow('▼',1));

      const stChk=document.createElement('div');stChk.className='st-check2'+(st.done?' done':'');stChk.textContent='✓';stChk.onclick=()=>toggleSubtask(t.id,st.id);

      // ── editable title ──
      const stName=document.createElement('span');stName.className='st-name'+(st.done?' struck':'');stName.textContent=st.title;
      stName.title='לחץ פעמיים לעריכה';
      stName.ondblclick=e=>{
        e.stopPropagation();
        const inp=document.createElement('input');
        inp.style.cssText='flex:1;font-size:13px;border:none;border-bottom:1.5px solid var(--acc);outline:none;background:transparent;color:var(--text);font-family:var(--font);direction:rtl;';
        inp.value=st.title; stName.replaceWith(inp); inp.focus(); inp.select();
        function finEdit(){const v=inp.value.trim();if(v)st.title=v;save();render();}
        inp.onblur=finEdit;inp.onkeydown=e=>{if(e.key==='Enter')finEdit();if(e.key==='Escape'){inp.value=st.title;finEdit();}};
      };

      const stDW=document.createElement('span');
      const dl2=daysLeft(st.date);const dc=st.date&&!st.done?(dl2<0?'urg':dl2<=7?'soon':''):'';
      const dateBtn=document.createElement('button');dateBtn.className=`st-date-btn ${dc}`;dateBtn.textContent=st.date?fmtDate(st.date):'＋ תאריך';
      dateBtn.onclick=()=>{const inp=document.createElement('input');inp.type='date';inp.className='st-date-inp';if(st.date)inp.value=st.date;stDW.replaceChild(inp,dateBtn);inp.focus();function fin(){st.date=inp.value;save();render();}inp.onchange=fin;inp.onblur=fin;inp.onkeydown=e=>{if(e.key==='Enter'||e.key==='Escape')fin();};};
      stDW.appendChild(dateBtn);

      const stDel=document.createElement('button');stDel.className='st-del2';stDel.textContent='✕';stDel.onclick=()=>delSubtask(t.id,st.id);

      item.append(arrows,stChk,stName,stDW,stDel);stBody.appendChild(item);
    });
    // inline add subtask
    const addRow=document.createElement('div');addRow.className='st-add-inline';
    const addCircle=document.createElement('div');addCircle.className='st-add-circle';
    const addInput=document.createElement('input');addInput.className='st-add-input';addInput.placeholder='＋ הוסף שלב...';addInput.dir='rtl';
    const addDate=document.createElement('input');addDate.type='date';addDate.className='st-add-date';
    const addSave=document.createElement('button');addSave.type='button';addSave.className='st-add-save';addSave.textContent='הוסף';
    function doAddSt(){const n=addInput.value.trim();if(!n)return;const task=S.tasks.find(x=>x.id===t.id);if(!task)return;if(!task.subtasks)task.subtasks=[];task.subtasks.push({id:uid(),title:n,done:false,date:addDate.value||''});save();render();}
    addSave.onclick=doAddSt;addInput.onkeydown=e=>{if(e.key==='Enter')doAddSt();};
    addRow.append(addCircle,addInput,addDate,addSave);stBody.appendChild(addRow);
    card.appendChild(stBody);
  }

  // size bar (edit mode only)
  const sizeBar = document.createElement('div'); sizeBar.className = 'card-size-bar';
  const sizeLabel = document.createElement('span'); sizeLabel.style.cssText='font-size:11.5px;color:var(--acc);font-weight:600;margin-left:auto'; sizeLabel.textContent='גודל:';
  [{l:'▣ רגיל',s:1},{l:'▣▣ רחב',s:2}].forEach(({l,s})=>{
    const b=document.createElement('button'); b.type='button'; b.className='wsz-btn'+(span===s?' active':'');
    b.textContent=l; b.onclick=e=>{e.stopPropagation();setCardSpan(t.id,s);};
    sizeBar.appendChild(b);
  });
  sizeBar.appendChild(sizeLabel);
  card.appendChild(sizeBar);

  return card;
}

function buildProjRow(t) {
  const p=proj(t.projectId);
  const sts=t.subtasks||[];
  const done=sts.filter(s=>s.done).length;
  const pct=sts.length?Math.round(done/sts.length*100):0;
  const isOpen=expanded.has(t.id);
  const isDone=t.status==='done';
  const dl=daysLeft(t.endDate);
  const dateCls=t.endDate&&!isDone?(dl<0?'urg':dl<=7?'soon':''):'';
  const dateTxt=t.endDate?(dl<0?`⚠️ ${fmtDate(t.endDate)}`:dl===0?'היום!':dl===1?'מחר':fmtDate(t.endDate)):'';

  const row=document.createElement('div'); row.className='proj-row';

  // ── header ──
  const hdr=document.createElement('div'); hdr.className='proj-header';
  hdr.onclick=e=>{if(e.target.closest('.proj-check,.proj-actions,.sts-badge')) return; if(expanded.has(t.id))expanded.delete(t.id);else expanded.add(t.id); render();};

  const expIcon=document.createElement('span'); expIcon.className='proj-expand'+(isOpen?' open':''); expIcon.textContent='▶';
  const chk=document.createElement('div'); chk.className='proj-check'+(isDone?' done':''); chk.textContent='✓';
  chk.onclick=e=>{e.stopPropagation();toggleDone(t.id);};
  const info=document.createElement('div'); info.className='proj-info';
  const title=document.createElement('span'); title.className='proj-title'+(isDone?' struck':''); title.textContent=t.title;
  info.appendChild(title);
  if(!S.filterDomain){const tag=document.createElement('span');tag.className='proj-domain-tag';tag.style.cssText=`background:${lighten(p.color)};color:${p.color}`;tag.textContent=p.name;info.appendChild(tag);}
  const meta=document.createElement('div'); meta.className='proj-meta';
  const stsBadge=document.createElement('button'); stsBadge.className=`sts-badge ${sCls(t.status)}`; stsBadge.textContent=sLabel(t.status);
  stsBadge.onclick=e=>{e.stopPropagation();cycleStatus(t.id);};
  meta.appendChild(stsBadge);
  if(dateTxt){const d=document.createElement('span');d.className=`proj-date ${dateCls}`;d.textContent=dateTxt;meta.appendChild(d);}
  if(sts.length){
    const pg=document.createElement('div');pg.className='proj-prog';
    const pb=document.createElement('div');pb.className='proj-prog-bar';
    const pf=document.createElement('div');pf.className='proj-prog-fill';pf.style.cssText=`width:${pct}%;background:${p.color}`;pb.appendChild(pf);
    const pt=document.createElement('span');pt.className='proj-prog-txt';pt.textContent=`${done}/${sts.length}`;
    pg.append(pb,pt); meta.appendChild(pg);
  }
  const acts=document.createElement('div'); acts.className='proj-actions';
  const editBtn=document.createElement('button'); editBtn.className='icon-btn'; editBtn.textContent='✏️'; editBtn.onclick=e=>{e.stopPropagation();openTaskModal('',t.id);};
  const delBtn=document.createElement('button'); delBtn.className='icon-btn'; delBtn.textContent='🗑'; delBtn.onclick=e=>{e.stopPropagation();delTask(t.id);};
  acts.append(editBtn,delBtn);
  hdr.append(expIcon,chk,info,meta,acts);
  row.appendChild(hdr);

  // ── subtasks (when open) ──
  if(isOpen) {
    const body=document.createElement('div'); body.className='subtasks-body';
    if(sts.length){
      const spb=document.createElement('div');spb.className='sub-prog-bar-full';
      const spf=document.createElement('div');spf.className='sub-prog-bar-fill';spf.style.cssText=`width:${pct}%;background:${p.color}`;spb.appendChild(spf);body.appendChild(spb);
    }
    sts.forEach(st=>{
      const item=document.createElement('div'); item.className='st-item';
      const stChk=document.createElement('div'); stChk.className='st-check2'+(st.done?' done':''); stChk.textContent='✓';
      stChk.onclick=()=>toggleSubtask(t.id,st.id);
      const stName=document.createElement('span'); stName.className='st-name'+(st.done?' struck':''); stName.textContent=st.title;

      // editable date button
      const stDateWrap=document.createElement('span');
      const dl2=daysLeft(st.date);
      const dc=st.date&&!st.done?(dl2<0?'urg':dl2<=7?'soon':''):'';
      const dateBtn=document.createElement('button'); dateBtn.className=`st-date-btn ${dc}`;
      dateBtn.textContent=st.date?fmtDate(st.date):'＋ תאריך';
      dateBtn.onclick=()=>{
        const inp=document.createElement('input'); inp.type='date'; inp.className='st-date-inp';
        if(st.date) inp.value=st.date;
        stDateWrap.replaceChild(inp,dateBtn);
        inp.focus();
        inp.onchange=()=>{st.date=inp.value;save();render();};
        inp.onblur=()=>{st.date=inp.value;save();render();};
        inp.onkeydown=e=>{if(e.key==='Enter'||e.key==='Escape'){st.date=inp.value;save();render();}};
      };
      stDateWrap.appendChild(dateBtn);

      const stDel=document.createElement('button'); stDel.className='st-del2'; stDel.textContent='✕';
      stDel.onclick=()=>delSubtask(t.id,st.id);
      item.append(stChk,stName,stDateWrap,stDel);
      body.appendChild(item);
    });

    // inline add subtask
    const addRow=document.createElement('div'); addRow.className='st-add-inline';
    const addCircle=document.createElement('div'); addCircle.className='st-add-circle';
    const addInput=document.createElement('input'); addInput.className='st-add-input'; addInput.placeholder='＋ הוסף שלב...'; addInput.dir='rtl';
    const addDate=document.createElement('input'); addDate.type='date'; addDate.className='st-add-date';
    const addSave=document.createElement('button'); addSave.type='button'; addSave.className='st-add-save'; addSave.textContent='הוסף';
    function doAddSt(){const n=addInput.value.trim();if(!n)return;const task=S.tasks.find(x=>x.id===t.id);if(!task)return;if(!task.subtasks)task.subtasks=[];task.subtasks.push({id:uid(),title:n,done:false,date:addDate.value||''});save();render();}
    addSave.onclick=doAddSt;
    addInput.onkeydown=e=>{if(e.key==='Enter')doAddSt();};
    addRow.append(addCircle,addInput,addDate,addSave);
    body.appendChild(addRow);
    row.appendChild(body);
  }
  return row;
}

// ── FLAT TASK LIST (secondary view) ──────────────────────────────
function renderTaskList(container) {
  const tabs=document.createElement('div'); tabs.className='day-tabs';
  [['all','הכל'],['today','היום'],['tomorrow','מחר'],['week','השבוע']].forEach(([k,lbl])=>{
    const b=document.createElement('button'); b.type='button'; b.className='day-tab'+(S.dayTab===k?' active':'');
    const cnt=flatItems(filteredTasks(),getDateFilter(k)).filter(i=>!i.done).length;
    b.textContent=`${lbl}${k!=='all'&&cnt>0?` (${cnt})`:''}`;
    b.onclick=()=>{S.dayTab=k;render();};
    tabs.appendChild(b);
  });
  container.appendChild(tabs);
  const filter=getDateFilter(S.dayTab);
  let items=flatItems(filteredTasks(),filter);
  items.sort((a,b)=>{ if(!a.date&&!b.date)return 0; if(!a.date)return 1; if(!b.date)return-1; return a.date.localeCompare(b.date); });
  const defaultDate=S.dayTab==='today'?todayStr():S.dayTab==='tomorrow'?tomorrowStr():'';
  const table=document.createElement('table'); table.className='task-table';
  table.innerHTML=`<thead><tr><th style="width:48px"></th><th>משימה</th><th style="width:36px"></th><th style="width:110px">סטטוס</th><th style="width:90px">תאריך</th><th style="width:48px"></th></tr></thead>`;
  const tbody=document.createElement('tbody');
  if(items.length){const done=[],notDone=[];items.forEach(i=>(i.done?done:notDone).push(i));[...notDone,...done].forEach(item=>tbody.appendChild(buildTableRow(item)));}
  appendInlineAddRow(tbody, defaultDate);
  table.appendChild(tbody);
  const foot=document.createElement('div'); foot.className='table-footer';
  if(items.length){const doneC=items.filter(i=>i.done).length;foot.innerHTML=`<span class="tf-count">${doneC} מתוך ${items.length} הושלמו</span>`;}
  const wrap=document.createElement('div'); wrap.appendChild(table); wrap.appendChild(foot);
  container.appendChild(wrap);
}

// ── TABLE ROW ─────────────────────────────────────────────────────
function buildTableRow(item) {
  const dl=daysLeft(item.date);
  const durCls=item.date&&!item.done?(dl<0?'urg':dl<=7?'soon':''):'';
  const dateTxt=item.date?(dl<0?`⚠️ ${fmtDate(item.date)}`:dl===0?'היום':dl===1?'מחר':fmtDate(item.date)):'—';
  const p=proj(item.projectId);
  const tr=document.createElement('tr');
  if(item.done) tr.classList.add('done-row');
  const tdChk=document.createElement('td');
  const cw=document.createElement('div'); cw.className='row-check-wrap';
  const chk=document.createElement('div'); chk.className='row-check'+(item.done?' chk':''); chk.textContent='✓';
  chk.onclick=()=>{if(item.type==='sub')toggleSubtask(item.tid,item.id);else toggleDone(item.tid);};
  cw.appendChild(chk); tdChk.appendChild(cw);
  const tdName=document.createElement('td'); tdName.className='row-name-cell';
  const rTitle=document.createElement('div'); rTitle.className='row-title'+(item.done?' struck':''); rTitle.textContent=item.title;
  const rCtx=document.createElement('div'); rCtx.className='row-ctx';
  if(item.parent) { const rp=document.createElement('span'); rp.className='row-parent'; rp.textContent=item.parent; rCtx.appendChild(rp); }
  if(!S.filterDomain) { const pt=document.createElement('span'); pt.className='row-proj-tag'; pt.style.cssText=`background:${lighten(p.color)};color:${p.color}`; pt.textContent=item.projName; rCtx.appendChild(pt); }
  tdName.append(rTitle,rCtx);
  const tdPri=document.createElement('td'); tdPri.style.cssText='padding:12px 14px;text-align:center;';
  const pd=document.createElement('span'); pd.className=`pri-dot ${priCls(item.priority)}`; pd.title=priLabel(item.priority); tdPri.appendChild(pd);
  const tdSts=document.createElement('td'); tdSts.style.padding='12px 10px';
  const sb=document.createElement('button'); sb.className=`sts-badge ${sCls(item.status)}`; sb.textContent=sLabel(item.status); sb.onclick=()=>cycleStatus(item.tid); tdSts.appendChild(sb);
  const tdDate=document.createElement('td'); tdDate.className=`date-cell ${durCls}`; tdDate.textContent=dateTxt;
  const tdEdit=document.createElement('td'); tdEdit.className='edit-cell';
  const eb=document.createElement('button'); eb.className='icon-btn'; eb.textContent='✏️'; eb.onclick=()=>openTaskModal('',item.tid); tdEdit.appendChild(eb);
  tr.append(tdChk,tdName,tdPri,tdSts,tdDate,tdEdit);
  return tr;
}

// ── INLINE ADD ────────────────────────────────────────────────────
function appendInlineAddRow(tbody, defaultDate) {
  const tr=document.createElement('tr'); tr.className='inline-add-trigger';
  const td1=document.createElement('td');
  const td2=document.createElement('td'); td2.colSpan=5;
  const lbl=document.createElement('div'); lbl.className='inline-add-label';
  lbl.innerHTML=`<div class="inline-add-circle"></div><span>＋ הוסף משימה</span>`;
  td2.appendChild(lbl);
  tr.append(td1,td2);
  tr.onclick=()=>activateInlineAdd(tbody,tr,defaultDate);
  tbody.appendChild(tr);
}

function activateInlineAdd(tbody, triggerRow, defaultDate) {
  const tr=document.createElement('tr'); tr.className='inline-add-active';
  const td1=document.createElement('td');
  td1.innerHTML='<div class="row-check-wrap"><div class="row-check"></div></div>';
  const td2=document.createElement('td'); td2.colSpan=5;
  const wrap=document.createElement('div'); wrap.className='inline-input-wrap';
  const nameIn=document.createElement('input'); nameIn.className='inline-task-input'; nameIn.placeholder='שם המשימה...'; nameIn.dir='rtl';
  const meta=document.createElement('div'); meta.className='inline-meta';
  const sel=document.createElement('select'); sel.className='inline-sel';
  S.projects.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.name;sel.appendChild(o);});
  if(S.filterDomain) sel.value=S.filterDomain;
  const dateIn=document.createElement('input'); dateIn.type='date'; dateIn.className='inline-date-in'; if(defaultDate)dateIn.value=defaultDate;
  const saveBtn=document.createElement('button'); saveBtn.type='button'; saveBtn.className='inline-save-btn'; saveBtn.textContent='הוסף ✓';
  const cancelBtn=document.createElement('button'); cancelBtn.type='button'; cancelBtn.className='inline-cancel-btn'; cancelBtn.textContent='✕';
  meta.append(sel,dateIn,saveBtn,cancelBtn);
  wrap.append(nameIn,meta); td2.appendChild(wrap);
  tr.append(td1,td2);
  tbody.replaceChild(tr,triggerRow);
  setTimeout(()=>nameIn.focus(),20);
  function doSave(){const n=nameIn.value.trim();if(n){S.tasks.push({id:uid(),title:n,projectId:sel.value,status:'todo',startDate:'',endDate:dateIn.value||'',priority:'medium',owner:'',notes:'',subtasks:[]});save();renderSidebar();}render();}
  function doCancel(){render();}
  saveBtn.onclick=doSave; cancelBtn.onclick=doCancel;
  nameIn.onkeydown=e=>{if(e.key==='Enter')doSave();if(e.key==='Escape')doCancel();};
}

// ── CRUD ──────────────────────────────────────────────────────────
function openTaskModal(defaultPid='',editId='') {
  editSubtasks=[];
  const modal=document.getElementById('task-modal');
  const sel=document.getElementById('tm-proj'); sel.innerHTML='';
  S.projects.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.name;sel.appendChild(o);});
  if(editId){
    const t=S.tasks.find(x=>x.id===editId); if(!t)return;
    document.getElementById('tm-ttl').textContent='ערוך פרויקט';
    document.getElementById('tm-id').value=t.id; document.getElementById('tm-name').value=t.title;
    sel.value=t.projectId; document.getElementById('tm-status').value=t.status;
    document.getElementById('tm-start').value=t.startDate||''; document.getElementById('tm-end').value=t.endDate||'';
    document.getElementById('tm-pri').value=t.priority||'medium'; document.getElementById('tm-owner').value=t.owner||'';
    document.getElementById('tm-notes').value=t.notes||'';
    editSubtasks=JSON.parse(JSON.stringify(t.subtasks||[]));
  } else {
    document.getElementById('tm-ttl').textContent='פרויקט חדש';
    document.getElementById('tm-id').value=''; document.getElementById('tm-name').value='';
    sel.value=defaultPid||S.filterDomain||(S.projects[0]?.id||'');
    document.getElementById('tm-status').value='todo'; document.getElementById('tm-start').value=''; document.getElementById('tm-end').value='';
    document.getElementById('tm-pri').value='medium'; document.getElementById('tm-owner').value=''; document.getElementById('tm-notes').value='';
  }
  renderStEditList();
  modal.classList.remove('hidden'); setTimeout(()=>document.getElementById('tm-name').focus(),50);
}
function closeTaskModal(){document.getElementById('task-modal').classList.add('hidden');editSubtasks=[];}

function renderStEditList(){
  const el=document.getElementById('st-edit-list'); el.innerHTML='';
  editSubtasks.forEach((st,i)=>{
    const row=document.createElement('div'); row.className='ste-row';

    // done checkbox
    const chk=document.createElement('div'); chk.className='ste-check'+(st.done?' done':''); chk.textContent='✓';
    chk.onclick=()=>{st.done=!st.done;renderStEditList();};

    // editable title input
    const titleInp=document.createElement('input');
    titleInp.value=st.title;
    titleInp.style.cssText='flex:1;font-size:13px;border:none;border-bottom:1px solid var(--border);outline:none;background:transparent;color:var(--text);font-family:var(--font);direction:rtl;padding:2px 0;min-width:0;';
    titleInp.placeholder='שם השלב...';
    titleInp.oninput=()=>{ st.title=titleInp.value; };
    if(st.done) titleInp.style.textDecoration='line-through';
    if(st.done) titleInp.style.color='var(--t3)';

    // editable date input
    const dateInp=document.createElement('input'); dateInp.type='date';
    dateInp.value=st.date||'';
    dateInp.style.cssText='font-size:11px;border:1px solid var(--border);border-radius:5px;padding:2px 6px;background:var(--surface);color:var(--t2);outline:none;flex-shrink:0;';
    dateInp.onchange=()=>{ st.date=dateInp.value; };

    // delete
    const del=document.createElement('button'); del.className='ste-del'; del.textContent='✕';
    del.onclick=()=>{editSubtasks=editSubtasks.filter(s=>s.id!==st.id);renderStEditList();};

    row.append(chk,titleInp,dateInp,del); el.appendChild(row);
  });
}
function addStFromModal(e){
  if(e&&e.key&&e.key!=='Enter')return;
  const n=document.getElementById('new-st-name').value.trim();
  const d=document.getElementById('new-st-date').value;
  if(!n)return;
  editSubtasks.push({id:uid(),title:n,done:false,date:d||''});
  document.getElementById('new-st-name').value=''; document.getElementById('new-st-date').value='';
  renderStEditList();
}
function saveTask(){
  const title=document.getElementById('tm-name').value.trim(); if(!title){toast('יש להזין שם');return;}
  const id=document.getElementById('tm-id').value;
  const task={id:id||uid(),title,projectId:document.getElementById('tm-proj').value,status:document.getElementById('tm-status').value,startDate:document.getElementById('tm-start').value,endDate:document.getElementById('tm-end').value,priority:document.getElementById('tm-pri').value,owner:document.getElementById('tm-owner').value.trim(),notes:document.getElementById('tm-notes').value.trim(),subtasks:editSubtasks};
  if(id){const i=S.tasks.findIndex(t=>t.id===id);S.tasks[i]=task;}else S.tasks.push(task);
  save(); closeTaskModal(); renderSidebar(); render(); toast(id?'עודכן':'נוצר');
}
function delTask(id){if(!confirm('למחוק?'))return;S.tasks=S.tasks.filter(t=>t.id!==id);save();renderSidebar();render();toast('נמחק');}
function toggleDone(id){const t=S.tasks.find(x=>x.id===id);if(!t)return;t.status=t.status==='done'?'todo':'done';save();render();}
function cycleStatus(id){const c=['todo','inprog','done','stuck'];const t=S.tasks.find(x=>x.id===id);if(!t)return;t.status=c[(c.indexOf(t.status)+1)%c.length];save();render();}
function toggleSubtask(tid,sid){const t=S.tasks.find(x=>x.id===tid);if(!t)return;const st=t.subtasks.find(s=>s.id===sid);if(st)st.done=!st.done;save();render();}

function openProjModal(id=''){
  const modal=document.getElementById('proj-modal');
  const cr=document.getElementById('cswatches'); cr.innerHTML=''; selColor=COLORS[0];
  COLORS.forEach(c=>{const sw=document.createElement('div');sw.className='csw'+(c===selColor?' sel':'');sw.style.background=c;sw.onclick=()=>{selColor=c;document.querySelectorAll('.csw').forEach(s=>s.classList.remove('sel'));sw.classList.add('sel');};cr.appendChild(sw);});
  document.getElementById('pm-id').value=id; document.getElementById('pm-name').value=id?proj(id).name:'';
  modal.classList.remove('hidden'); setTimeout(()=>document.getElementById('pm-name').focus(),50);
}
function closeProjModal(){document.getElementById('proj-modal').classList.add('hidden');}
function saveProj(){
  const name=document.getElementById('pm-name').value.trim(); if(!name){toast('יש להזין שם');return;}
  const id=document.getElementById('pm-id').value;
  if(id){const p=S.projects.find(x=>x.id===id);if(p){p.name=name;p.color=selColor;}}
  else S.projects.push({id:uid(),name,color:selColor});
  save(); closeProjModal(); renderSidebar(); render(); toast(id?'עודכן':'נוצר');
}

function exportData(){const b=new Blob([JSON.stringify({projects:S.projects,tasks:S.tasks},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='taskflow-export.json';a.click();toast('יוצא');}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.projects&&d.tasks){S.projects=d.projects;S.tasks=d.tasks;save();renderSidebar();render();toast('יובא');}}catch{toast('שגיאה');}};r.readAsText(f);e.target.value='';}

function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.getElementById('toasts').appendChild(t);setTimeout(()=>t.remove(),2500);}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeTaskModal();closeProjModal();}});

// load localStorage first (instant)
load(); loadLayout(); renderSidebar(); render();
setSyncDot('saving');
console.log('[SYNC] App initialized, attempting cloud sync...');
// sync with cloud: if cloud has data → use it; if cloud is empty → push local data up
loadFromCloud().then(loaded => {
  if(loaded) {
    console.log('[SYNC] Cloud data was loaded, re-rendering UI');
    renderSidebar(); render(); // cloud had data — use it
  } else {
    console.log('[SYNC] Cloud is empty, pushing local data to cloud');
    // cloud is empty — push all local data up now
    saveToCloud();
    setSyncDot('saving');
  }
}).catch(err => {
  console.error('[SYNC] Error during initialization sync:', err);
  setSyncDot('offline');
});

// no resize re-render — canvas uses absolute positioning and saves positions in localStorage
